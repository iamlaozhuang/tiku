# 题库系统术语与枚举注册表
# ============================
# 本文件是项目命名的唯一机器可读数据源 (Single Source of Truth)。
#
# 用途：
#   1. AI 上下文注入（AGENTS.md 引用本文件）
#   2. 工程初始化时生成 TypeScript / Python 枚举常量
#   3. 数据库迁移脚本校验
#   4. API Schema 校验
#   5. 人类可读文档（naming-conventions.md）的枚举部分可从本文件生成
#
# 维护规则：
#   - 新增业务概念时，先在此文件注册，再写代码
#   - 修改术语时，同步更新 AGENTS.md 和 naming-conventions.md
#   - 禁止在代码中硬编码本文件未注册的枚举值

# ============================================================
# 一、术语表 (Glossary)
# ============================================================
# 每条术语包含：
#   key:        代码中使用的英文标识（snake_case）
#   chinese:    中文名称
#   abbr:       允许的缩写（null 表示不允许缩写）
#   scope:      适用层（db / api / code / all）
#   notes:      冲突提示或使用说明

glossary:
  # --- 核心业务 ---
  profession:
    chinese: 专业
    abbr: prof
    scope: all
    notes: 枚举值见 enums.profession

  level:
    chinese: 等级
    abbr: null
    scope: all
    notes: 一级至五级，数值 1-5

  subject:
    chinese: 科目
    abbr: subj
    scope: all
    notes: 前端类型建议用 ExamSubject 避免与通用 Subject 冲突

  question:
    chinese: 题目
    abbr: q
    scope: all
    notes: 题库中的单道题

  paper:
    chinese: 试卷
    abbr: null
    scope: all

  paper_asset:
    chinese: 试卷原始文件
    abbr: pa
    scope: all
    notes: 绑定在试卷上的原始 PDF/Word 附件

  content_image:
    chinese: 富文本图片
    abbr: null
    scope: all
    notes: 题目、材料、解析和答案富文本引用的受管图片；不得与 paper_asset 混用

  material:
    chinese: 材料
    abbr: mat
    scope: all

  paper_section:
    chinese: 大题/模块
    abbr: ps
    scope: all
    notes: 必须带 paper_ 前缀，避免与 HTML <section> 冲突。禁止用 section

  question_group:
    chinese: 材料题组
    abbr: qg
    scope: all

  question_option:
    chinese: 选项
    abbr: qo
    scope: all
    notes: 必须带 question_ 前缀，避免与 UI 组件 Option 冲突。禁止用 option

  scoring_point:
    chinese: 评分点
    abbr: sp
    scope: all

  knowledge_node:
    chinese: 知识点
    abbr: kn
    scope: all

  tag:
    chinese: 标签
    abbr: null
    scope: all

  analysis:
    chinese: 解析（老师解析）
    abbr: null
    scope: all
    notes: 区别于 ai_explanation（AI 讲解）

  standard_answer:
    chinese: 标准答案
    abbr: sa
    scope: all

  # --- 用户与授权 ---
  user:
    chinese: 用户/账号
    abbr: null
    scope: all
    notes: 统一账号实体，手机号为唯一标识

  student:
    chinese: 学员
    abbr: null
    scope: all

  admin:
    chinese: 管理员
    abbr: null
    scope: all

  organization:
    chinese: 企业/组织
