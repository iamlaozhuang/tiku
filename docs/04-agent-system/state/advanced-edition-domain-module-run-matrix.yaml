globalModuleRunPolicy:
  definition:
    sourcePlanningModule: One of the seven historical planning modules from advanced-edition code-stage planning.
    executionModule: One of the six Module Run v2 business-closure domains used for execution planning.
    moduleRun: A time-boxed execution group for one execution module that may contain multiple narrow Batches.
    batch: A reviewable implementation or verification slice inside a Module Run with its own focused tests and commit.
    subtask: The smallest RED/GREEN focused-test and commit unit inside a Batch.
  rhythm:
    - Read context once per Module Run unless thread rollover or context compaction requires recovery audit.
    - Create one Module Run v2 plan that lists candidate Batches, local full-loop targets, and stop conditions.
    - Keep every Batch narrow and independently reviewable even when one Module Run contains several Batches.
    - Keep focused tests, evidence, and commits at Batch or subtask level according to the task plan.
    - Write short Batch evidence for each Batch and one Module Run closeout evidence at the end.
  maxBatchCountPerModuleRun: 8
  maxSubtaskCountPerBatch: 7
  defaultModuleCloseoutTarget: local_full_loop_until_blocked
  requiresNewHumanApprovalWhen:
    - dependency or package or lockfile change is needed
    - schema or migration change is needed
    - repository, API route, or Server Action work is needed outside the approved Module Run plan
    - provider, env/secret, staging/prod/cloud/deploy, payment, or external-service work is needed
    - local provider sandbox execution is needed without explicit user approval for that local call
    - real authorization permission model, role, permission, quota, or entitlement behavior changes
    - Cost Calibration Gate execution is requested
    - evidence would expose secrets, tokens, database URLs, Authorization headers, provider payloads, raw prompts, raw
      answers, plaintext redeem_code, employee subjective answer text, full paper content, or raw generated AI content
  defaultAllowedSurfaces:
    - src/server/models/**
    - src/server/contracts/**
    - src/server/validators/**
    - src/server/services/**
    - corresponding focused *.test.ts
    - docs/04-agent-system/state/project-state.yaml
    - docs/04-agent-system/state/task-queue.yaml
    - docs/05-execution-logs/task-plans/**
    - docs/05-execution-logs/evidence/**
    - docs/05-execution-logs/audits-reviews/**
  defaultBlockedSurfaces:
    - package.json
    - pnpm-lock.yaml
    - package-lock.yaml
    - package-lock.json
    - src/db/schema/**
    - drizzle/**
    - .env.local
    - .env.example
    - scripts/**
    - e2e/**
  defaultValidationProfile:
    - npm.cmd run lint
    - npm.cmd run typecheck
    - focused unit tests for changed validators, services, mappers, and local contracts
    - local repository or Docker DB checks only when the Module Run plan explicitly allows them
    - local API, Server Action, UI/browser, or role-flow checks only when the Module Run plan explicitly allows them
    - git diff --check
    - scoped prettier --write
    - scoped prettier --check
    - required anchor check for module terminology and blocked gates
    - powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\scripts\agent-system\Test-GitCompletionReadiness.ps1
      -BaseBranch master
