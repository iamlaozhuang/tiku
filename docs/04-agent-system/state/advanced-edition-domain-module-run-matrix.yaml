schemaVersion: 1
generatedByTask: advanced-edition-domain-module-run-matrix
generatedAt: "2026-06-08T08:05:00-07:00"
purpose: >-
  Source-of-truth matrix for advancing advanced-edition work by domain-level Module Run instead of restarting full
  governance for every small Batch.
mode:
  current: local_auto_candidate
  moduleRunRhythmEnabledForFutureBatches: true
  firstEligibleImplementationBatchNumber: 101
  costCalibrationGateExecutionPermitted: false
globalModuleRunPolicy:
  definition:
    domainModule: Business or governance domain boundary from the advanced-edition implementation planning set.
    moduleRun: A time-boxed execution group for one domain module that may contain multiple narrow Batches.
    batch: A reviewable implementation slice inside a Module Run with its own focused tests and commit set.
    subtask: The smallest RED/GREEN focused-test and commit unit inside a Batch.
  rhythm:
    - Read context once per Module Run.
    - Create one Module Run plan that lists candidate Batches and stop conditions.
    - Keep each Batch narrow and independently reviewable.
    - Keep RED/GREEN focused tests and commits at subtask level.
    - Write short Batch evidence for each Batch and one Module Run rollup evidence at the end.
  maxBatchCountPerModuleRun: 4
  maxSubtaskCountPerBatch: 7
  requiresNewHumanApprovalWhen:
    - dependency or package or lockfile change is needed
    - schema or migration change is needed
    - repository or API route or Server Action work is needed
    - provider, env/secret, staging/prod/cloud/deploy, payment, or external-service work is needed
    - real authorization permission model, role, permission, quota, or entitlement behavior changes
    - Cost Calibration Gate execution is requested
    - evidence would expose secrets, tokens, database URLs, Authorization headers, provider payloads, raw prompts, raw answers, plaintext redeem_code, employee subjective answer text, full paper content, or raw generated AI content
  defaultAllowedSurfaces:
    - src/server/models/**
    - src/server/contracts/**
    - src/server/validators/**
    - src/server/services/**
    - corresponding focused *.test.ts
    - docs/04-agent-system/state/project-state.yaml
    - docs/04-agent-system/state/task-queue.yaml
    - docs/05-execution-logs/task-plans/**
    - docs/05-execution-logs/evidence/**
    - docs/05-execution-logs/audits-reviews/**
  defaultBlockedSurfaces:
    - package.json
    - pnpm-lock.yaml
    - package-lock.yaml
    - package-lock.json
    - src/db/schema/**
    - drizzle/**
    - .env.local
    - .env.example
    - scripts/**
    - e2e/**
  defaultValidationProfile:
    - npm.cmd run lint
    - npm.cmd run typecheck
    - focused unit tests for changed validators and services
    - git diff --check
    - scoped prettier --write
    - scoped prettier --check
    - required anchor check for the module terminology and blocked gate
    - powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\scripts\agent-system\Test-GitCompletionReadiness.ps1 -BaseBranch master
