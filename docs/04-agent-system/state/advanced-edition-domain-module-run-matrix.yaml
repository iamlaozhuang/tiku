localFullLoopGate:
  purpose: Module Run v2 completion standard. Each Module Run must progress as far as local dev can safely prove.
  levels:
    L1:
      name: lint_typecheck
      requirement: static lint, typecheck, formatting, naming, and changed-file inventory pass.
    L2:
      name: unit
      requirement: focused unit tests prove isolated service, validator, mapper, or model behavior.
    L3:
      name: local_repository_or_docker_db
      requirement: local repository or Docker DB validation passes when the approved Module Run plan includes it.
    L4:
      name: local_api_or_server_action_contract
      requirement: local API route or Server Action contract is verified without leaking DB rows or internal ids.
    L5:
      name: local_ui_browser
      requirement: local UI or browser verification proves visible flow against localhost with redacted evidence.
    L6:
      name: role_flow
      requirement: local student, admin, organization, employee, or super_admin flow verifies role boundaries.
    L7:
      name: local_human_review
      requirement: user-accompanied local review records redacted acceptance notes.
    L8:
      name: environment_provider_deploy_blocked_remainder
      requirement: staging, prod, provider, deploy, payment, and external-service gaps are recorded as blocked remainder.
  completionRule: >-
    A Module Run is not complete merely because local contracts pass. It must reach the highest safe local level for
    that domain, then explicitly list L8 blocked remainders without claiming non-local readiness.
localExperienceClosureGate:
  purpose: >-
    Cross-module orchestration layer for the user's target: advance the advanced-edition work toward a locally runnable,
    locally verifiable experience loop instead of letting modules finish as isolated contracts.
  governanceRole: orchestration_gate_not_business_module
  completionTarget: local_experience_closed_loop_until_blocked
  appliesTo:
    - Module Run v2 planning
    - nextModuleRunCandidate selection
    - automation startup handoff
    - local validation planning
  experienceChains:
    - chain: personal-learning-ai-experience
      businessGoal: student can locally request and inspect a redacted AI task result reference in an approved flow
      requiredModules:
        - authorization-and-access
        - ai-task-and-provider
        - personal-learning-ai
      minimumLocalFullLoopGate: L5
      acceptanceBridgeRequiredBeforeClosure: true
    - chain: organization-training-experience
      businessGoal: admin and employee can locally traverse organization training lifecycle boundaries
      requiredModules:
        - authorization-and-access
        - ai-task-and-provider
        - organization-training
        - organization-analytics
      minimumLocalFullLoopGate: L6
      acceptanceBridgeRequiredBeforeClosure: true
    - chain: ops-governance-experience
      businessGoal: operations-facing governance summaries and redacted references can be locally reviewed
      requiredModules:
        - authorization-and-access
        - ai-task-and-provider
        - ops-governance-and-retention
      minimumLocalFullLoopGate: L6
      acceptanceBridgeRequiredBeforeClosure: true
    - chain: retention-recovery-experience
      businessGoal: retention, hidden-expired, and recovery boundaries can be locally checked without destructive action
      requiredModules:
        - personal-learning-ai
        - organization-training
        - ops-governance-and-retention
      minimumLocalFullLoopGate: L6
      acceptanceBridgeRequiredBeforeClosure: true
    - chain: cross-role-denial-and-redaction-experience
      businessGoal: role denial, redaction, and evidence boundaries are locally visible across student/admin/employee/ops paths
      requiredModules:
        - authorization-and-access
        - ai-task-and-provider
        - personal-learning-ai
        - organization-training
        - organization-analytics
        - ops-governance-and-retention
      minimumLocalFullLoopGate: L6
      acceptanceBridgeRequiredBeforeClosure: true
  moduleRunPlanningRequiredFields:
    - targetExperienceChain or explicit none-with-reason
    - currentLocalFullLoopGateLevel
    - targetLocalFullLoopGateLevel
    - acceptanceBridgeNeeded
    - userVisibleSurfaceNeeded
    - focusedTestPlan
    - blockedRemainder
  promotionRule: >-
    A Module Run may start at local contract or service level, but it must state how it advances one experience chain
    toward L5/L6 local closure. Modules with L5/L6 minimums cannot be marked locally closed until a future approved
    acceptance bridge task covers API or Server Action, UI/browser, and role-flow validation as applicable.
  allowedOnlyWhenExplicitlyNamedByPlan:
    - src/server/repositories/**
    - src/server/mappers/**
    - src/app/api/v1/**
    - src/app/(student)/**
    - src/app/(admin)/**
    - tests/unit/**
    - e2e/**
  alwaysBlockedWithoutSeparateHumanApproval:
    - schema or migration change
    - dependency, package, or lockfile change
    - provider, env/secret, staging/prod/cloud/deploy, payment, or external-service work
    - Cost Calibration Gate execution
  automationStartupRequirement: >-
    When automation wakes with no current in-progress task, it must select or prepare a pending task that keeps
    `localExperienceClosureGate` in scope. If another run owns the lease or a thread has in-progress work, automation
    must stop with the existing-run decision instead of starting unrelated work.
  acceptanceBridgePlan:
    status: proposal_only
    generatedByTask: module-run-v2-local-experience-acceptance-planning
    purpose: >-
      Name the local API, Server Action, UI/browser, role-flow, and e2e bridge tasks needed before any L5/L6 experience
      chain can claim local closure.
    currentPriorityChain: personal-learning-ai-experience
    bridgeSequence:
      - step: local_api_or_server_action_contract
        targetLocalFullLoopGate: L4
        candidateTask: module-run-v2-personal-ai-local-transport-contract-planning
        approvalRequired: localExperienceAcceptanceBridgeApproved
        blockedUntilApproved:
          - src/app/api/v1/**
          - server action surfaces
          - repository or mapper expansion
      - step: local_ui_browser_entry
        targetLocalFullLoopGate: L5
        candidateTask: module-run-v2-personal-ai-local-ui-browser-planning
        approvalRequired: localExperienceAcceptanceBridgeApproved
        blockedUntilApproved:
          - src/app/(student)/**
          - browser verification
          - visible result-reference flow
      - step: local_role_flow_and_e2e_readiness
        targetLocalFullLoopGate: L6
        candidateTask: module-run-v2-cross-role-local-flow-planning
        approvalRequired: localExperienceAcceptanceBridgeApproved
        blockedUntilApproved:
          - role-flow verification
          - e2e/**
          - cross-role denial and redaction checks
    hardBlocks:
      - provider, env/secret, staging/prod/cloud/deploy, payment, or external-service work
      - dependency, package, lockfile, schema, or migration work
      - raw prompt, raw response, raw generated AI content, provider payload, secret, token, database URL, Authorization header,
        plaintext redeem_code, full paper content, or raw answer text in evidence
      - Cost Calibration Gate execution
implementationAutoSeedGate:
  purpose: >-
    Let a completed Module Run v2 planning task seed and hand off executable low-risk local implementation tasks without
    another manual restart, while preserving hard blocks for high-risk work.
  machineDecisionScript: scripts/agent-system/Test-ModuleRunV2ImplementationAutoSeedReadiness.ps1
  approvalAnchor: autoDriveLocalImplementationApproval
  localExperienceBridgeApprovalAnchor: localExperienceAcceptanceBridgeApproved
  planningTaskMaySeedImplementationWhen:
    - planning evidence records `implementationAutoSeedGate`.
    - planning evidence names a target `localExperienceClosureGate` chain or explicit none-with-reason.
    - every seeded implementation task has `taskKind: implementation`.
    - every seeded implementation task records `autoDriveLocalImplementationApproval`.
    - every seeded implementation task has allowed files, blocked files, risk types, validation commands, evidence path,
      and audit review path.
    - every seeded implementation task has focused tests and localFullLoopGate target.
    - every seeded implementation task is small enough for an independent commit.
  safeLocalImplementationSurfaces:
    - src/server/models/**
    - src/server/contracts/**
    - src/server/validators/**
    - src/server/services/**
    - docs/04-agent-system/state/project-state.yaml
    - docs/04-agent-system/state/task-queue.yaml
    - docs/05-execution-logs/task-plans/**
    - docs/05-execution-logs/evidence/**
    - docs/05-execution-logs/audits-reviews/**
  bridgeSurfacesRequireLocalExperienceAcceptanceBridge:
    - src/server/repositories/**
    - src/server/mappers/**
    - src/app/api/v1/**
    - src/app/(student)/**
    - src/app/(admin)/**
    - e2e/**
  alwaysBlockedForAutoSeed:
    - .env.local
    - .env.example
    - package.json
    - pnpm-lock.yaml
    - package-lock.yaml
    - package-lock.json
    - src/db/schema/**
    - drizzle/**
    - provider, env/secret, staging/prod/cloud/deploy, payment, or external-service work
    - schema or migration work
    - dependency or package work
    - Cost Calibration Gate execution
  automationRule: >-
    After a planning task closes, automation may continue to the first pending seeded implementation task only if
    `Test-ModuleRunV2ImplementationAutoSeedReadiness.ps1` passes for the planning task and candidate task. Otherwise it
    must stop and report the hard block.
experienceClosureContribution:
  authorization-and-access: >-
    Foundation module for local user, organization, and role context. Future work should bridge L4 API or Server Action
    contracts before downstream L5/L6 experience chains claim local closure.
  ai-task-and-provider: >-
    Provider-agnostic task lifecycle module. Future work should keep local mock or fixture behavior explicit and avoid
    real provider calls unless a separately approved local sandbox task exists.
  personal-learning-ai: >-
    Student-facing experience module. Future work should identify the local UI/browser path and redacted result
    reference path needed for L5 local closure.
  organization-training: >-
    Admin and employee role-flow module. Future work should map draft/publish/takedown/copy and employee answer
    lifecycle into an approved L6 local role-flow path.
  organization-analytics: >-
    Aggregate reporting module. Future work should connect organization-training output to local summary or API
    acceptance without exposing private answer payloads.
  ops-governance-and-retention: >-
    Operations and retention module. Future work should prove redaction, hidden-expired, recovery-boundary, and
    governance summary behavior locally without destructive data action.
localProviderSandboxGate:
  purpose: Allow carefully bounded local AI API validation without weakening provider, env/secret, or Cost Calibration Gate.
  approvalRequired: explicit user approval for the specific local provider sandbox call
  allowedOnlyWhen:
    - Module Run plan names `local_provider_sandbox`.
    - The call runs only in local dev.
    - No `.env.local` content is read, displayed, copied, or recorded.
    - Evidence records only redacted metadata, success or failure category, and local validation result.
  forbidden:
    - API key, secret, token, database URL, Authorization header, raw prompt, raw response, raw generated AI content, or
      provider payload in evidence
    - provider package, SDK, quota, endpoint, model selection, fallback, staging/prod, cloud, deploy, payment, or
      external-service configuration
    - Cost Calibration Gate execution
  boundaryStatement: >-
    Cost Calibration Gate remains blocked. A user-approved local_provider_sandbox call is not provider cost calibration
    and is not approval for staging, prod, provider configuration, or secret handling.
threadRolloverGate:
  purpose: Keep larger Module Run v2 batches from overloading a single thread.
  machineDecisionScript: scripts/agent-system/Test-ModuleRunV2ThreadRolloverReadiness.ps1
  thresholds:
    batches0To3: continue_current_thread by default when Git, evidence, and scope are clear
    afterBatch4: suggest_new_thread or generate a handoff before continuing
    afterBatch6: require_new_thread unless the user explicitly requests continuation and recovery audit passes
    moduleRunCloseout: require_new_thread before entering the next execution module by default
    highRiskBoundary: require_new_thread for schema, dependency, provider, env/secret, deploy, or security review boundary
    contextCompaction: recovery audit required before deciding whether to continue
  handoffRequiredFields:
    - current module run
    - completed batches
    - latest SHA
    - evidence, audit review, and plan paths
    - blocked gates
    - allowed next task
    - forbidden scope
    - validation status
    - next recommended module
automationHandoffPolicy:
  unattendedStopDecisionScript: scripts/agent-system/Test-ModuleRunV2UnattendedReadiness.ps1
  automationLeaseReadinessScript: scripts/agent-system/Test-ModuleRunV2AutomationLeaseReadiness.ps1
  automationStartupReadinessScript: scripts/agent-system/Test-ModuleRunV2AutomationStartupReadiness.ps1
  stoppedAutomationHygieneScript: scripts/agent-system/Test-ModuleRunV2StoppedAutomationHygiene.ps1
  handoffGeneratorScript: scripts/agent-system/New-ModuleRunV2ThreadHandoff.ps1
  threadLaunchPolicyScript: scripts/agent-system/Test-ModuleRunV2ThreadLaunchPolicy.ps1
  autopilotOrchestratorScript: scripts/agent-system/Invoke-ModuleRunV2Autopilot.ps1
  unattendedDecisionLabels:
    continue: proceed with the approved local task scope
    closeout_recovery: recover only from an actionable incomplete closeout transaction before choosing the next step
    stop_for_hard_block: stop and hand off before retrying or broadening scope
  autopilotDecisionLabels:
    continue_current_thread: proceed inside current approved scope
    closeout_executed: approved local closeout executed; rerun startup readiness for next task selection
    prepare_handoff: generate handoff but do not launch a thread
    prepare_handoff_then_continue: continue only after handoff is available
    launch_new_thread: Codex agent layer may call create_thread with generated handoff
    stop_for_hard_block: stop on hard block
    stop_for_human_handoff: stop for user decision
  startupDecisionLabels:
    continue_current_task: scheduled automation may continue the current in-progress task
    prepare_next_task: scheduled automation may prepare the pending planning task only
    prepare_seeded_implementation_task:
      scheduled automation may prepare a pending implementation task only after
      implementationAutoSeedGate passes
    closeout_recovery: scheduled automation may run closeout recovery only for actionable incomplete closeout state
    stop_existing_run_active: another human or automation run owns the lane
    stop_for_hard_block: startup gate found unsafe state
    no_executable_task: queue and state have no legal action
  leaseDecisionLabels:
    no_active_lease: no durable lease exists
    expired_lease_reclaimable: expired lease can be reclaimed when the worktree is clean or unavailable
    stop_existing_run_active: non-expired lease blocks the scheduler wakeup
    stop_expired_dirty_lease: expired lease worktree has uncommitted changes and must be inspected
    stop_invalid_lease: lease file is malformed
  stoppedAutomationHygieneDecisionLabels:
    clean: no residual automation artifacts need action
    cleanup_available: residual artifacts are present and safe cleanup candidates
    cleanup_completed: explicit cleanup removed safe residual artifacts
    cleanup_deferred: explicit cleanup attempted safe residual artifacts but OS locks or transient filesystem access require later retry; guarded dispatch may continue when no active owner or dirty/ambiguous state remains
    stop_existing_run_active: non-expired lease means another run owns the lane
    stop_invalid_lease: lease file is malformed and requires manual inspection
    stop_dirty_worktree: expired lease or automation worktree has uncommitted changes
    stop_manual_cleanup_required: cleanup path or removal result requires manual inspection
  dryRunControls:
    handoffGeneratorDryRun: New-ModuleRunV2ThreadHandoff.ps1 -DryRun does not write the requested output path
    autopilotDryRunHandoff: Invoke-ModuleRunV2Autopilot.ps1 -DryRunHandoff uses temporary handoff evidence outside the repository
    durableHandoffWrites: allowed only inside an approved closeout or handoff task
  postPushStateReconciliation:
    acceptedCloseoutAncestor: state repository SHA may be an ancestor of current master/origin when task is done or closed and Git is clean
    hardBlock: non-ancestor SHA drift remains HARD_BLOCK_REPOSITORY_SHA_DRIFT
  nextModuleRunCandidate:
    trigger: Module Run closeout evidence is written and validation passes.
    reads:
      - advanced-edition-domain-module-run-matrix.yaml
      - project-state.yaml
      - task-queue.yaml
      - latest evidence and audit review
    output: proposal only; no cross-module implementation starts without a Module Run plan.
    mustReference:
      - localExperienceClosureGate
      - target experience chain or explicit none-with-reason
  automationMay:
    - run automation startup readiness before unattended readiness or autopilot orchestration
    - detect that a Module Run appears complete from durable state
    - execute approvedCloseoutContinuation only when commit, merge, push, cleanup, and worktree parking are explicitly
      approved for the completed task and closeout readiness plus pre-push readiness pass
    - generate the next Module Run draft proposal
    - seed low-risk local implementation tasks when implementationAutoSeedGate passes
    - update handoff proposal and blocked remainder wording
    - mark provider, env/secret, staging/prod, deploy, payment, or Cost Calibration Gate work as blocked remainder
    - inventory and clean safe stopped-automation residual artifacts only through
      Test-ModuleRunV2StoppedAutomationHygiene.ps1 -Cleanup
  automationMustNot:
    - ignore an active lease, stale automation worktree, or no-executable-task startup decision
    - infer closeout approval from a generic planning or implementation approval without explicit commit/merge/push/cleanup wording
    - clean dirty automation worktrees or invalid lease files without manual inspection
    - modify schema, migration, dependency, env/secret, provider config, deploy config, payment, or external-service surfaces
    - read or record secrets
    - execute Cost Calibration Gate
    - continue across execution modules without a new Module Run plan and human approval
    - execute a seeded implementation task when implementationAutoSeedGate fails
hookIntegrationMatrix:
  status: local_unattended_control_ready_after_dry_run_hardening
  implementationRequiresSeparateTaskApproval: true
  levels:
    advisory: report only; does not block commit or progression
    warning: progression may continue only when evidence explains the warning
    hard_block: stop commit, push, or module closeout until fixed or separately approved
  hooks:
    unattended-pre-step:
      strength: hard_block_after_unattended_control
      plannedChecks:
        - branch policy and protected branch stop
        - remote divergence stop
        - repository SHA recovery sync
        - task plan, evidence, and audit paths
        - changed-file scope against allowedFiles and blockedFiles
        - blocked risk gate stop decision
    autopilot-orchestrator:
      strength: hard_block_for_stop_decisions
      plannedChecks:
        - unattended stop decision
        - thread rollover decision
        - handoff generation
        - thread launch policy
        - create_thread only when launch policy returns launch_new_thread
    automation-startup:
      strength: hard_block_before_scheduler_continuation
      plannedChecks:
        - automation lease readiness
        - current task and pending task inventory
        - Codex automation approval state
        - stale or dirty automation worktree stop
        - blocked gate anchors
    stopped-automation-hygiene:
      strength: hard_block_for_unsafe_cleanup
      plannedChecks:
        - active lease stop
        - invalid lease stop
        - dirty worktree stop
        - expired clean lease cleanup candidate
        - stale clean automation worktree cleanup candidate
        - dry-run handoff temp cleanup candidate
        - cleanup path containment
    pre-work:
      strength: hard_block_after_mechanism_completion
      plannedChecks:
        - state and queue current task alignment
        - branch policy and blocked gate awareness
        - Module Run v2 plan exists before code-stage execution
    pre-edit:
      strength: hard_block_after_mechanism_completion
      plannedChecks:
        - allowedFiles and blockedFiles match planned edits
        - high-risk surfaces are not touched without approval
    pre-commit:
      strength: hard_block
      plannedChecks:
        - sensitive evidence scan
        - blocked file scan
        - glossary terminology scan
        - lint and typecheck
      existingHuskyPreCommit:
        - powershell.exe -NoProfile -ExecutionPolicy Bypass -File ./scripts/agent-system/Test-ModuleRunV2PreCommitHardening.ps1
        - npm.cmd run lint-staged
        - npm.cmd run lint
        - npm.cmd run typecheck
    pre-push:
      strength: hard_block
      plannedChecks:
        - GitCompletionReadiness
        - master and origin alignment
        - evidence and audit paths exist
    post-commit:
      strength: advisory_after_mechanism_completion
      plannedChecks:
        - commit and evidence inventory
        - changed-file scope summary
    module-closeout:
      strength: hard_block
      plannedChecks:
        - all Batches accounted for
        - validation and evidence recorded
        - audit review exists
        - thread rollover decision recorded
futureBatchPolicy:
  batch101AndLater:
    defaultStartStep: Create or update a Module Run v2 plan using this matrix before selecting concrete Batch slices.
    noDocsOnlyApprovalPhaseByDefault: true
    batchCommitsRemainRequired: true
    moduleRunRollupRequired: true
    maxBatchCountPerModuleRun: 8
    localFullLoopGateRequired: true
    threadRolloverDecisionRequired: true
    nextModuleRunCandidateProposalRequiredAtCloseout: true
    pushRequiresExplicitApproval: true
    unattendedPreStepDecisionRequired: true
    autopilotDecisionRequiredBeforeThreadLaunch: true
terminologyAnchors:
  - Module Run v2
  - localFullLoopGate
  - localProviderSandboxGate
  - threadRolloverGate
  - hookIntegrationMatrix
  - localExperienceClosureGate
  - implementationAutoSeedGate
  - autoDriveLocalImplementationApproval
  - unattendedStopDecision
  - threadRolloverDecision
  - threadLaunchDecision
  - autopilotDecision
  - stoppedAutomationHygiene
  - authorization
  - paper
  - mock_exam
  - redeem_code
  - audit_log
  - ai_call_log
  - local_auto_candidate
  - Cost Calibration Gate remains blocked
