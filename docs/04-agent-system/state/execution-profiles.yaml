      moduleReadinessOnce: true
    fixtureRepairAllowance:
      mode: test_only_contract_fixture
      filePattern: src|tests/**/*.test.ts
      requiresRedGreen: true
      productionSource: blocked
    closeoutShape:
      parentEvidence: required
      childResultEvidence: required
      allowedFiles: parent_child_union
      blockedFiles: enforced_globally
    blockedCapabilities:
      - providerCall
      - schemaMigration
      - dependencyIntroduction
      - localE2ERuntimeValidation
      - localFullFlowGate
      - costCalibrationGate
      - productionSourceFixtureRepair
    forbiddenActions:
      - dev_server
      - browser_or_playwright_runtime_validation
      - full_e2e_suite
      - provider_model_call
      - schema_or_drizzle_or_migration_change
      - package_or_lockfile_change
