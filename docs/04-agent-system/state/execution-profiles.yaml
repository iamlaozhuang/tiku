workPacket:
  allowedRiskProfiles:
    - mechanism_low_risk
    - low_risk_local_code
    - repository_runtime_local
    - low_risk_experience_batch
  maxTasksPerPacket:
    docs_state_lite: 10
    local_experience_audit: 2
    local_low_risk_experience_batch: 5
    local_unit_tdd: 4
    repository_runtime_tdd: 3
    local_full_flow: 1
  disallowMixedProfiles:
    - schema_isolated
    - dependency_isolated
    - provider_local_smoke
  guardedGoalPacket:
    mode: guarded_serial_read_only_v1
    docsStateAuditOnlyCloseout: packet_closeout_allowed_after_task_gates
    productOrRuntimeScope: single_task_closeout_required
    localFullFlow: single_task_only
    forbiddenClaims:
      - guarded goal packet diagnostics do not execute tasks, mutate queue state, run Browser/Playwright/e2e, merge, push, deploy, call providers, change dependencies, change schema, or execute Cost Calibration Gate
localFullFlowGate:
  default: blocked_without_task_profile
  approvedValue: approved_localhost_only
  allowedHosts:
    - localhost
    - 127.0.0.1
    - ::1
  allowedData:
    - local fixtures
    - disposable local data
  blockedActions:
    - staging/prod/cloud/external-service target
    - provider/model call
    - private row data exposure
    - public identifier inventories
    - full e2e suite by default
    - headed/debug/browser mode unless explicitly task-approved
forbiddenClaims:
  - This catalog does not approve product implementation.
  - This catalog does not approve schema, dependency, provider, deploy, payment, external-service, PR, force-push, env/secret, or Cost Calibration Gate work.
  - This catalog does not by itself approve Browser, Playwright, e2e, dev server, or local full-flow execution; a task must explicitly select the profile and pass local-only gates.
