schemaVersion: 1
generatedByTask: mechanism-profile-catalog-ready-set-foundation
generatedAt: "2026-06-17T03:52:10-07:00"
purpose: Durable catalog for Tiku agent execution profiles, evidence modes, validation policies, queue selection modes, work packet limits, and local full-flow guardrails. This catalog is a profile source-of-truth, not a direct approval for high-risk actions.
defaults:
  executionProfile: legacy_explicit
  evidenceMode: full
  validationPolicy: legacy_explicit
  queueSelectionMode: legacy_explicit
l123AccelerationPolicy:
  defaultMode: proposal_only
  maxTasksPerPacket: 10
  modes:
    proposal_only:
      meaning: Classify and report L123 acceleration opportunities without writing state or executing tasks.
    docs_state_apply:
      meaning: Apply docs/state approval-only packages when readiness returns approval_package_ready or l3_approval_only.
    exact_scope_local_auto_execute:
      meaning: Reserved for future approval. Disabled in v1.
      enabled: false
  packages:
    l123_approval_package:
      executionProfile: docs_state_lite
      validationPolicy: docs_state
      allowedTaskKinds:
        - docs_state_approval_package
        - l123_acceleration_approval_package
      allowedCapabilities:
        - docsStateOnlyQueueMaintenance
        - freshApprovalTextMaterialization
      blockedCapabilities:
        - sourceTestE2eScriptChange
        - databaseRead
        - databaseWrite
        - envLocalRead
        - envSecretOutput
        - providerModelCall
        - schemaMigration
        - dependencyIntroduction
        - stagingProdDeploy
        - paymentOcrExportExternalService
        - costCalibrationGate
        - pr
        - forcePush
        - destructiveDatabase
        - rawSensitiveEvidence
    l123_exact_scope_local:
      executionProfile: local_unit_tdd
      validationPolicy: local_unit
      requiredFields:
        - allowedFiles
        - blockedFiles
        - commands
        - redaction
        - rollback
        - stopConditions
      autoExecuteEnabled: false
      blockedWhenAllowedFilesMatch:
        - .env*
        - package.json
        - package-lock.yaml
        - package-lock.json
        - pnpm-lock.yaml
        - src/**
        - tests/**
        - e2e/**
        - src/db/schema/**
        - drizzle/**
    l123_l3_approval_only:
      executionProfile: docs_state_lite
      validationPolicy: docs_state
      highRiskCapabilities:
        - providerModelCall
        - databaseRead
        - databaseWrite
        - envLocalRead
        - envSecretOutput
        - schemaMigration
        - dependencyIntroduction
        - stagingProdDeploy
        - paymentOcrExportExternalService
        - costCalibrationGate
      autoExecuteEnabled: false
evidenceModes:
  full:
    requiredAnchors:
      - task id
      - branch
      - validation commands and results
      - redaction status
      - blocked remainder
      - residual risk
      - Cost Calibration Gate remains blocked
  lite:
    allowedFor:
      - docs_state_lite
      - mechanism_low_risk
    requiredAnchors:
      - task id
      - changed files
      - validation commands and results
      - redaction status
      - blocked remainder
      - residual risk
      - Cost Calibration Gate remains blocked
    forbiddenShortcuts:
      - skipping validation command recording
      - skipping redaction checks
      - skipping blocked remainder
      - claiming production readiness
validationPolicies:
  legacy_explicit:
    meaning: Use task-declared validationCommands without inferred privileges.
  docs_state:
    requiredCommands:
      - git diff --check
      - scoped prettier check for changed docs/state/evidence/audit/task-plan files
      - npm.cmd run lint
      - npm.cmd run typecheck
      - relevant mechanism diagnostics or smoke scripts
  local_unit:
    requiredCommands:
      - focused unit command
      - git diff --check
      - npm.cmd run lint
      - npm.cmd run typecheck
  runtime_unit:
    requiredCommands:
      - focused runtime unit command without real private data
      - git diff --check
      - npm.cmd run lint
      - npm.cmd run typecheck
  local_full_flow:
    requiredCommands:
      - explicit local-only startup or fixture command approved by task
      - targeted localhost-only Browser or Playwright command approved by task
      - git diff --check
      - npm.cmd run lint
      - npm.cmd run typecheck
  low_risk_experience_batch:
    requiredCommands:
      - focused unit commands declared by changed child tasks or child keep-partial decision
      - npm.cmd run test:e2e -- --list once per batch when validationDedup.e2eListOnce is true
      - git diff --check
      - npm.cmd run lint once per batch when validationDedup.lintTypecheckOnce is true
      - npm.cmd run typecheck once per batch when validationDedup.lintTypecheckOnce is true
      - Module Run v2 readiness gates once per batch when validationDedup.moduleReadinessOnce is true
    fixtureRepairAllowance:
      mode: test_only_contract_fixture
      allowedPattern: src|tests/**/*.test.ts
      requiresRedGreen: true
      productionSource: blocked
  high_risk_isolated:
    requiredCommands:
      - task-specific gate command
      - isolated evidence and audit
      - git diff --check
queueSelectionModes:
  legacy_explicit:
    behavior: Select at most the first dependency-satisfied pending task.
    default: true
  ready_set:
    behavior: Report all dependency-satisfied pending tasks as a ready set before selecting one.
    selectionRule: agent may choose the first ready task unless a current workPacket explicitly narrows the module scope.
    blockedWhen:
      - dependency unresolved in active queue or task-history-index
      - task blocked gates exceed profile
      - dirty worktree exists
      - active owner exists
