schemaVersion: 1
generatedByTask: module-run-v2-autodrive-phase-0-2
purpose: Durable control schema for Module Run v2 unattended local autodrive. This file defines required approval and lifecycle fields. It does not approve product implementation or high-risk actions by itself.
taskAutodrivePolicy:
  requiredForAutonomousAction: true
  fields:
    mode:
      allowedValues:
        - proposal_only
        - guarded_serial
        - guarded_parallel
        - closeout_only
    allowedAgentActions:
      allowedValues:
        - claim_task
        - continue_task
        - scaffold_task_plan
        - run_validation
        - write_evidence
        - local_commit
        - prepare_parallel_workers
        - adopt_recoverable_run
        - open_recovery_plan
        - run_closeout_recovery
        - request_owner_recovery
        - reconcile_post_closeout_state
        - confirm_post_closeout_checkpoint
        - seed_implementation_tasks
        - closeout_recoverable_auto_seed_transaction
    blockedAgentActions:
      requiredValues:
        - merge
        - push
        - pr
        - deploy
        - dependency_change
        - schema_migration
        - env_secret
        - provider_call
        - cost_calibration_gate
    maxAutonomousSteps:
      default: 3
      maximum: 10
    stopOn:
      requiredValues:
        - hard_block
        - blocked_gate
        - validation_failure
        - out_of_scope_change
        - dirty_unknown_worktree
        - active_owner_present
schemaReadiness:
  decisionOutput: autodriveSchemaDecision
  decisions:
    - can_autodrive
    - proposal_only
    - not_executable_closed_task
    - stop_for_hard_block
  terminalTaskStatuses:
    - done
    - closed
    - pushed
    - merged
  idleCandidateValue: no-executable-task-seed-or-approve-next-task
  executionRule: terminal task diagnostics are zero-exit idle results and must not be treated as executable autodrive work.
startupDiagnostics:
  startupDecisions:
    runnable:
      - continue_current_task
      - prepare_next_task
      - closeout_recovery
      - adopt_recoverable_run
      - open_recovery_plan
      - cleanup_stale_artifacts
    guardianStops:
      - exit_active_owner_present
      - stop_existing_run_active
      - manual_required_owner_recovery
      - stop_for_manual_decision
      - stop_for_hard_block
      - no_executable_task
  localToolingReadinessValues:
    - not_applicable
    - missing_node_modules
    - degraded
    - ready
  branchHygieneAdvisoryDecisions:
    - cleanup_available
    - manual_review_available
    - clean
    - advisory_unavailable
  executionRule: startup diagnostics are advisory unless startupDecision itself returns a hard block or cleanup transaction.
autoSeedBridge:
  purpose: Bridge no_executable_task into a guarded proposal or approved queue seed transaction.
  defaultMode: proposal_only
  proposalLayer:
    scriptPath: scripts/agent-system/Get-ModuleRunV2ImplementationSeedProposal.ps1
    decisionOutput: seedProposalDecision
    decisions:
      - proposal_available
      - executable_task_exists
      - no_seed_candidate
      - stop_for_hard_block
    writePolicy: read_only
  transactionLayer:
    scriptPath: scripts/agent-system/New-ModuleRunV2ImplementationSeed.ps1
    decisionOutput: seedTransactionDecision
    decisions:
      - plan_only
      - seeded
      - manual_required
      - no_seed_candidate
      - executable_task_exists
      - stop_for_hard_block
    writePolicy: apply_requires_autoDriveLocalImplementationApproval
  selfReviewLayer:
    scriptPath: scripts/agent-system/Test-ModuleRunV2ImplementationSeedSelfReview.ps1
    decisionOutput: seedSelfReviewDecision
    decisions:
      - passed
      - stop_for_hard_block
    requiredChecks:
      - targetLocalClosure coverage
      - required task metadata
      - autoDriveLocalImplementationApproval
      - safe allowedFiles and blockedFiles
      - Test-ModuleRunV2ImplementationAutoSeedReadiness command
      - validation command minimums
      - redactionRequired
      - Cost Calibration Gate remains blocked
  recoveryLayer:
    scriptPath: scripts/agent-system/Test-ModuleRunV2SeedTransactionRecoveryReadiness.ps1
    closeoutScriptPath: scripts/agent-system/Invoke-ModuleRunV2RecoverableSeedTransactionCloseout.ps1
    decisionOutput: seedRecoveryDecision
    decisions:
      - recoverable_seed_transaction
      - manual_required
      - stop_for_hard_block
    recoveryAction: closeout_recoverable_auto_seed_transaction
    writePolicy: execute_requires_autoDriveLocalImplementationApproval_commit_fast_forward_merge_push_cleanup
  runnerBridge:
    noExecutableTaskWithoutApproval: seed_proposal_available
    noExecutableTaskWithApproval: seed_transaction_applied
    postSeedDefault: closeout_auto_seed_transaction_before_claiming_seeded_work
    continueAfterAutoSeedOverride: ContinueAfterAutoSeed
    seedApplyParameter: AllowAutoSeed
    approvalParameter: AutoSeedApprovalStatement
    maxBatchParameter: AutoSeedMaxBatchCount
capabilities:
  defaultState: denied
  fields:
    localDockerDatabase:
      default: task_approval_required
      approvedValue: approved_local_dev_only
      blockedActions:
        - schema_migration
        - destructive_data_operation
        - staging_prod_connection
    projectResourceRead:
      default: task_approval_required
      approvedValue: approved_read_only_redacted
      protectedContent:
        - full_paper_content
        - raw_answer_text
        - cleartext_redeem_code
    providerKey:
      default: env_destination_confirmation_required
      approvedValue: approved_confirmed_local_destination
    providerCall:
      default: blocked_without_task_approval
      approvedValue: approved_redacted_local_validation
    schemaMigration:
      default: blocked_without_task_approval
      approvedValue: approved_migration_plan
    costCalibrationGate:
      default: blocked
      approvedValue: not_supported_by_default
  gate:
    scriptPath: scripts/agent-system/Test-ModuleRunV2LocalCapabilityGate.ps1
    decisionOutput: localCapabilityDecision
    adapterActionOutput: adapterAction
    allowedIntents:
      - declare_adapter
      - use_capability
    decisions:
      - adapter_contract_ready
      - capability_ready
      - manual_required
      - stop_for_hard_block
closeoutPolicy:
  localCommit:
    allowedValues:
      - approved
      - not_approved
  fastForwardMerge:
    requiredFields:
      - approved
      - targetBranch
  push:
    requiredFields:
      - approved
      - target
  cleanup:
    requiredFields:
      - deleteShortBranch
      - parkWorktree
postCloseoutState:
  repositoryShaSemantics:
    allowedValues:
      - accepted_ancestor_checkpoint
    default: accepted_ancestor_checkpoint
    meaning: project-state repository SHAs are durable accepted checkpoints; they do not need to equal the commit that stores the state file.
  currentTaskCommitShaSemantics:
    allowedValues:
      - task_closeout_checkpoint_or_pending_local_commit
    default: task_closeout_checkpoint_or_pending_local_commit
    meaning: currentTask.commitSha may be a pending placeholder before closeout or an accepted task closeout checkpoint after closeout.
  reconcileTransaction:
    decisionOutputs:
      - already_current
      - checkpoint_accepted
      - checkpoint_confirmed
      - manual_required
      - stop_for_hard_block
    writePolicy: no_self_referential_sha_write
validationLifecycle:
  optionalField: validationCommandLifecycle
  phases:
    - pre_edit
    - post_edit
    - closeout
    - advisory_baseline
  executionRule: serial validation and closeout readiness use post_edit and closeout commands when this field is present; pre_edit commands are entry-gate evidence only; advisory_baseline commands can document unrelated baseline health but do not block closeout unless a task explicitly makes them hard gates.
validationSurface:
  scriptPath: scripts/agent-system/Test-ModuleRunV2ValidationSurfaceReadiness.ps1
  smokePath: scripts/agent-system/Test-ModuleRunV2ValidationSurfaceReadiness.Smoke.ps1
  decisionOutput: validationSurfaceDecision
  decisions:
    - focused_validation_satisfied
    - validation_surface_mismatch
    - validation_surface_incomplete
    - validation_evidence_missing
    - stop_for_hard_block
  broadGateValues:
    - not_applicable
    - unrelated_baseline_failure
    - advisory_unrelated_baseline_failure
    - failed_hard_gate
    - unknown
  closeoutTransactionStates:
    - closeout_pending_evidence
    - closeout_pending_commit_evidence
    - closeout_pending_audit
    - closeout_pending_audit_approval
    - closeout_ready
  ownerRecoveryDecisions:
    - no_owner_recovery_needed
    - manual_required_owner_recovery
  executionRule: stale dirty active run registries with safeToAdopt=false must not be auto-adopted or cleaned; startup may use this read-only classifier to produce manual_required_owner_recovery instead of a generic hard block.
runRegistryFinalizer:
  scriptPath: scripts/agent-system/Set-ModuleRunV2RunRegistryFinalizer.ps1
  smokePath: scripts/agent-system/Set-ModuleRunV2RunRegistryFinalizer.Smoke.ps1
  decisionOutput: runRegistryFinalizer
  requiredTerminalFields:
    - changedFiles
    - phase
    - blockerKind
    - evidencePath
    - auditReviewPath
    - closeoutTransactionState
    - safeToAdopt
    - cleanupPolicy
  executionRule: before an automation thread exits on a stopped, recoverable, cleanup-ready, or closed state, write the terminal run registry through the finalizer so startup can classify owner recovery, closeout recovery, cleanup, or idle without stale active-owner ambiguity.
registryLifecycle:
  statusField: runStatus
  allowedStatuses:
    - active
    - recoverable
    - stopped
    - abandoned
    - cleanup_ready
    - closed
  allowedCleanupPolicies:
    - none
    - cleanup_ready
  cleanupCandidateKinds:
    - stale_clean_worktree
    - orphan_worktree_directory
    - expired_active_missing_worktree
    - expired_active_terminal_registry
    - cleanup_ready_registry
  cleanupDecisions:
    - clean
    - cleanup_available
    - cleanup_completed
    - cleanup_deferred
    - stop_existing_run_active
    - stop_invalid_lease
    - stop_dirty_worktree
    - stop_manual_cleanup_required
    - manual_required_owner_recovery
  cleanupDeferredRule: cleanup_deferred is an advisory successful hygiene pass for safe cleanup candidates that could not be removed because of OS locks or transient filesystem access; it must not block guarded task dispatch when no active owner, dirty worktree, malformed lease, or unsafe path is present.
  redactionRequired: true
parallelBatch:
  requiredForParallelWorkers: true
  fields:
    - parallelBatchId
    - coordinatorTaskId
    - candidateTaskIds
    - baseSha
    - allowedParallelActions
    - blockedParallelActions
    - workerIsolation
    - serialIntegration
    - fileLocks
    - mergeOrder
evidenceMinimum:
  requiredAnchors:
    - RED
    - GREEN
    - localFullLoopGate
    - blocked remainder
    - threadRolloverGate
    - nextModuleRunCandidate
    - Cost Calibration Gate remains blocked
forbiddenClaims:
  - This schema does not approve product code.
  - This schema does not approve local Docker database operations without task approval.
  - This schema does not approve env or secret writes.
  - This schema does not approve provider calls.
  - This schema does not approve dependency, schema, migration, deploy, push, PR, or Cost Calibration Gate execution.
