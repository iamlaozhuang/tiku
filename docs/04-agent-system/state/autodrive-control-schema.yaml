schemaVersion: 1
generatedByTask: module-run-v2-autodrive-phase-0-2
purpose: Durable control schema for Module Run v2 unattended local autodrive. This file defines required approval and lifecycle fields. It does not approve product implementation or high-risk actions by itself.
taskAutodrivePolicy:
  requiredForAutonomousAction: true
  fields:
    mode:
      allowedValues:
        - proposal_only
        - guarded_serial
        - guarded_parallel
        - closeout_only
    allowedAgentActions:
      allowedValues:
        - claim_task
        - continue_task
        - scaffold_task_plan
        - run_validation
        - write_evidence
        - local_commit
        - prepare_parallel_workers
        - adopt_recoverable_run
        - open_recovery_plan
        - run_closeout_recovery
        - run_approved_closeout
        - prepare_short_branch
        - request_owner_recovery
        - reconcile_post_closeout_state
        - confirm_post_closeout_checkpoint
        - seed_implementation_tasks
        - closeout_recoverable_auto_seed_transaction
    blockedAgentActions:
      requiredValues:
        - merge
        - push
        - pr
        - deploy
        - dependency_change
        - schema_migration
        - env_secret
        - provider_call
        - cost_calibration_gate
    maxAutonomousSteps:
      default: 3
      maximum: 10
    stopOn:
      requiredValues:
        - hard_block
        - blocked_gate
        - validation_failure
        - out_of_scope_change
        - dirty_unknown_worktree
        - active_owner_present
schemaReadiness:
  decisionOutput: autodriveSchemaDecision
  decisions:
    - can_autodrive
    - proposal_only
    - validation_command_normalization_required
    - not_executable_closed_task
    - stop_for_hard_block
  terminalTaskStatuses:
    - done
    - closed
    - pushed
    - merged
  idleCandidateValue: no-executable-task-seed-or-approve-next-task
  executionRule: terminal task diagnostics are zero-exit idle results and must not be treated as executable autodrive work.
startupDiagnostics:
  stopTaxonomyValues:
    - runnable
    - approval_missing
    - active_owner
    - hygiene_deferred
    - remote_divergence
    - validation_failed
    - repair_required
    - no_task
    - registration_mismatch
    - branch_posture_required
    - closeout_pending
    - hard_block
  automationRegistration:
    scriptPath: scripts/agent-system/Test-ModuleRunV2AutomationRegistrationReadiness.ps1
    smokePath: scripts/agent-system/Test-ModuleRunV2AutomationRegistrationReadiness.Smoke.ps1
    decisionOutput: automationRegistrationDecision
    decisions:
      - ready
      - not_configured
      - stop_for_hard_block
    executionRule: project-state codexAutomationId/status must match the active local automation TOML; only tiku-module-run-v2-autopilot may be scheduled ACTIVE, while mechanic-2 remains on-demand only.
  primaryRepositoryPosture:
    defaultPath: D:\tiku
    passValues:
      - pass_clean_detached_aligned
      - pass_clean_protected_branch_aligned
    warningValues:
      - warning_clean_detached_stale
      - warning_clean_protected_branch_stale
    hardBlockValues:
      - dirty
      - unmerged_codex_branch
      - unexpected_branch
    executionRule: the primary long-lived local repository must stay clean detached or clean master/main; dirty state hard-stops startup and clean merged codex branches route to hygiene.
  startupDecisions:
    runnable:
      - continue_current_task
      - prepare_next_task
      - closeout_recovery
      - adopt_recoverable_run
      - open_recovery_plan
      - cleanup_stale_artifacts
    guardianStops:
      - exit_active_owner_present
      - stop_existing_run_active
      - manual_required_owner_recovery
      - stop_for_manual_decision
      - stop_for_hard_block
      - no_executable_task
  localToolingReadinessValues:
    - not_applicable
    - missing_node_modules
    - degraded
    - ready
  branchHygieneAdvisoryDecisions:
    - cleanup_available
    - manual_review_available
    - clean
    - advisory_unavailable
  branchPosture:
    decisionOutput: serialExecutorDecision
    decisions:
      - prepare_short_branch_required
      - ready_to_claim
      - task_claimed
    actionOutput: serialExecutorAction
    action: prepare_short_branch
    requiredBranchPattern: codex/*
    appliesWhen: task closeoutPolicy approves local commit, fast-forward merge to master, push origin/master, and cleanup
    executionRule: claim_task must not write queue or project-state for approved commit/merge/push closeout tasks unless the current branch is a codex/* short branch. Detached HEAD, master, main, and other branches must return branch_posture_required with prepare_short_branch guidance.
  executionRule: startup diagnostics are advisory unless startupDecision itself returns a hard block. Safe cleanup candidates emit startupHygieneAdvisory and must not preempt continue_current_task, closeout_recovery, prepare_next_task, or adopt_recoverable_run; cleanup_stale_artifacts is returned only when no executable task is available.
autoSeedBridge:
  purpose: Bridge no_executable_task into a guarded proposal or approved queue seed transaction.
  defaultMode: proposal_only_or_controlled_auto_seed
  controlledPolicyLayer:
    decisionPathField: automation.autoSeedApprovalDecisionPath
    approvedStatus: approved_by_controlled_auto_seed_policy
    pendingStatus: pending_human_decision
    policyId: controlled_auto_seed
    defaultMaxTasksPerSeed: 4
    executionRule: >-
      pending_human_decision blocks all seed transaction execution. approved_by_controlled_auto_seed_policy may apply only
      for the matching seed module, only outside PlanOnly, only when seedCandidateTaskCount is within maxTasksPerSeed, and
      only after the normal seed transaction plus self-review gates pass.
  proposalLayer:
    scriptPath: scripts/agent-system/Get-ModuleRunV2ImplementationSeedProposal.ps1
    decisionOutput: seedProposalDecision
    decisions:
      - proposal_available
      - executable_task_exists
      - no_seed_candidate
      - stop_for_hard_block
    writePolicy: read_only
  transactionLayer:
    scriptPath: scripts/agent-system/New-ModuleRunV2ImplementationSeed.ps1
    decisionOutput: seedTransactionDecision
    decisions:
      - plan_only
      - seeded
      - manual_required
      - no_seed_candidate
      - executable_task_exists
      - stop_for_hard_block
    writePolicy: apply_requires_autoDriveLocalImplementationApproval
  selfReviewLayer:
    scriptPath: scripts/agent-system/Test-ModuleRunV2ImplementationSeedSelfReview.ps1
    decisionOutput: seedSelfReviewDecision
    meceOutputs:
      - meceReviewDecision
      - meceCoverageStatus
      - meceGapCount
      - meceOverlapCount
    decisions:
      - passed
      - stop_for_hard_block
    requiredChecks:
      - targetLocalClosure coverage
      - unique targetClosureItem per seeded execution module
      - requirementRefs trace back to source planning task
      - useCases and acceptanceScenarios are non-empty
      - explicit blockedRemainder for unseeded matrix target closure
      - nonGoals preserve provider/env/schema/deploy/dependency/Cost Calibration Gate boundaries
      - validationProfile is non-empty
      - required task metadata
      - autoDriveLocalImplementationApproval
      - safe allowedFiles and blockedFiles
      - Test-ModuleRunV2ImplementationAutoSeedReadiness command
      - validation command minimums
      - redactionRequired
      - Cost Calibration Gate remains blocked
  recoveryLayer:
    scriptPath: scripts/agent-system/Test-ModuleRunV2SeedTransactionRecoveryReadiness.ps1
    closeoutScriptPath: scripts/agent-system/Invoke-ModuleRunV2RecoverableSeedTransactionCloseout.ps1
    decisionOutput: seedRecoveryDecision
    decisions:
      - recoverable_seed_transaction
      - manual_required
      - stop_for_hard_block
    recoveryAction: closeout_recoverable_auto_seed_transaction
    writePolicy: execute_requires_autoDriveLocalImplementationApproval_commit_fast_forward_merge_push_cleanup
  runnerBridge:
    noExecutableTaskWithoutApproval: seed_proposal_available
    noExecutableTaskWithApproval: seed_transaction_applied
    postSeedDefault: closeout_auto_seed_transaction_before_claiming_seeded_work
    continueAfterAutoSeedOverride: ContinueAfterAutoSeed
    seedApplyParameter: AllowAutoSeed
    approvalParameter: AutoSeedApprovalStatement
    maxBatchParameter: AutoSeedMaxBatchCount
boundedQueueDrain:
  purpose: Allow one automation wake to continue across multiple low-risk Module Run v2 batches without weakening quality gates.
  defaultMode: explicit_drainPolicy_or_synthesized_low_risk_local_code
  eligibilityGate:
    scriptPath: scripts/agent-system/Test-ModuleRunV2QueueDrainEligibility.ps1
    smokePath: scripts/agent-system/Test-ModuleRunV2QueueDrainEligibility.Smoke.ps1
    decisionOutput: queueDrainEligibilityDecision
    decisions:
      - eligible
      - not_eligible
      - single_task_only
      - stop_for_hard_block
    requiredTaskPolicy:
      drainPolicy:
        drainEligible:
          default: false
        riskProfile:
          allowedValues:
            - docs_governance
            - mechanism_low_risk
            - low_risk_local_code
            - single_task_only
            - blocked_high_risk
        validationCostClass:
          allowedValues:
            - light
            - standard
            - heavy
          default: standard
        requiredFreshApproval:
          default: false
        maxTasksPerWake:
          default: 2
          maximum: 10
        maxChangedFiles:
          default: 20
        maxChangedLines:
          default: 800
        autoRepairAllowance:
          allowedValues:
            - none
            - format_lint_evidence_once
          default: none
    executionRule: Missing drainPolicy defaults to not_eligible except for taskKind implementation tasks that satisfy the low-risk local implementation gate; those synthesize drainEligible true, riskProfile low_risk_local_code, validationCostClass standard, maxTasksPerWake 2, maxChangedFiles 20, maxChangedLines 800, and autoRepairAllowance format_lint_evidence_once. drainEligible true is accepted for docs_governance, mechanism_low_risk, and low_risk_local_code. single_task_only still returns single_task_only. High-risk riskTypes, requiredFreshApproval true, missing evidence/audit, missing validation surface, or missing structured closeoutPolicy hard-block drain.
  supervisor:
    scriptPath: scripts/agent-system/Invoke-ModuleRunV2QueueDrainSupervisor.ps1
    smokePath: scripts/agent-system/Invoke-ModuleRunV2QueueDrainSupervisor.Smoke.ps1
    decisionOutput: queueDrainDecision
    decisions:
      - ready_for_agent_task
      - closeout_executed_continue
      - budget_exhausted
      - approval_required
      - hard_block
      - idle
    defaultBudgets:
      maxTasksPerWake: 2
      maxWallClockMinutes: 90
      maxConsecutiveFailures: 1
      maxConsecutiveRecoveries: 2
      maxChangedFiles: 20
      maxChangedLines: 800
    manifestRoot: "%USERPROFILE%\\.codex\\tiku\\drain-runs"
    writePolicy: repo_external_manifest_only
    executionRule: The supervisor consumes existing runner and dispatcher outputs, checks drain eligibility before agent execution, and writes only repo-external drain manifests. It must not implement product work or bypass startup, schema, validation, closeout, pre-push, pre-commit, or blocked-gate checks. Approved closeout may run only through the existing approved closeout script when explicitly requested.
capabilities:
  defaultState: denied
  fields:
    localDockerDatabase:
      default: task_approval_required
      approvedValue: approved_local_dev_only
      blockedActions:
        - schema_migration
        - destructive_data_operation
        - staging_prod_connection
    destructiveLocalDockerDatabase:
      default: blocked_without_task_approval
      approvedValue: approved_destructive_local_dev_only
      requiredTaskEvidence:
        - operation_kind
        - local_docker_dev_target_alias
        - backup_snapshot_or_disposable_db_rationale
        - rollback_or_recovery_statement
        - redacted_evidence_plan
      blockedActions:
        - staging_prod_connection
        - database_url_evidence
        - unscoped_destructive_operation
    projectResourceRead:
      default: task_approval_required
      approvedValue: approved_read_only_redacted
      protectedContent:
        - full_paper_content
        - raw_answer_text
        - cleartext_redeem_code
    providerKey:
      default: env_destination_confirmation_required
      approvedValue: approved_confirmed_local_destination
    providerCall:
      default: blocked_without_task_approval
      approvedValue: approved_redacted_local_validation
    schemaMigration:
      default: blocked_without_task_approval
      approvedValue: approved_migration_plan
    localE2EValidation:
      default: blocked_without_task_approval
      approvedValue: approved_local_only_existing_specs
      allowedCommands:
        - npm.cmd run test:e2e -- --list
        - npm.cmd run test:e2e -- e2e/<existing-spec>.spec.ts
      blockedActions:
        - full_e2e_suite_by_default
        - e2e_ui_or_debug_mode
        - headed_browser_mode
        - non_existing_or_non_e2e_spec
        - env_secret_access
        - staging_prod_connection
        - provider_call
    localE2ESmokeTier:
      default: not_allowlisted
      approvedValue: safe_smoke
      allowedSpecs:
        - e2e/home.spec.ts
        - e2e/admin-role-denial-browser.spec.ts
        - e2e/local-auth-route-guard.spec.ts
      blockedTiers:
        - credentialed_local
        - data_write_or_seed
        - provider_or_cost_sensitive
        - staging_named
      blockedActions:
        - npm_test_default_full_suite
        - full_e2e_suite_by_default
        - e2e_ui_or_debug_mode
        - headed_browser_mode
        - new_e2e_spec_execution
        - non_allowlisted_spec_execution
        - generated_artifact_commit
        - committed_e2e_artifacts
    costCalibrationGate:
      default: blocked
      approvedValue: not_supported_by_default
  gate:
    scriptPath: scripts/agent-system/Test-ModuleRunV2LocalCapabilityGate.ps1
    decisionOutput: localCapabilityDecision
    adapterActionOutput: adapterAction
    allowedIntents:
      - declare_adapter
      - use_capability
    decisions:
      - adapter_contract_ready
      - capability_ready
      - manual_required
      - stop_for_hard_block
closeoutPolicy:
  approvedCloseoutScriptPath: scripts/agent-system/Invoke-ModuleRunV2ApprovedCloseout.ps1
  localToolingPreflight:
    scriptPath: scripts/agent-system/Test-ModuleRunV2CloseoutLocalToolingReadiness.ps1
    smokePath: scripts/agent-system/Test-ModuleRunV2CloseoutLocalToolingReadiness.Smoke.ps1
    decisionOutput: closeoutLocalToolingDecision
    decisions:
      - ready
      - not_applicable
      - stop_for_hard_block
    executionRule: approved closeout must run this preflight after module-closeout and pre-push readiness but before queue or project-state mutation; npm lint and typecheck may run, but lint-staged or other write-capable preflight commands must not run here.
  recoveryPacket:
    scriptPath: scripts/agent-system/New-ModuleRunV2RecoveryPacket.ps1
    smokePath: scripts/agent-system/New-ModuleRunV2RecoveryPacket.Smoke.ps1
    decisionOutput: recoveryPacketDecision
    defaultRoot: "%USERPROFILE%\\.codex\\tiku\\handoffs"
    decisions:
      - written
      - reused
    redactionRule: recovery packets must not include secrets, provider payloads, raw prompts, raw answers, DB URLs, Authorization headers, or complete paper/material content.
  closeoutExecutionStates:
    - closeout_local_tooling_failed
    - closeout_commit_failed_state_restored
    - closeout_commit_created_pending_merge_push_cleanup
    - closeout_closed_committed_merged_pushed_cleanup_complete
  localCommit:
    allowedValues:
      - approved
      - not_approved
  fastForwardMerge:
    requiredFields:
      - approved
      - targetBranch
  push:
    requiredFields:
      - approved
      - target
  cleanup:
    requiredFields:
      - deleteShortBranch
      - parkWorktree
    optionalFields:
      - fetchPruneAfterPush
  noisePolicy:
    postMergeEvidenceOnlyCommitPolicy: not_required_by_default
    finalHandoffShaPolicy: final_handoff_or_project_state
    persistentPostMergeEvidenceRequiredWhen:
      - missing_pre_merge_validation
      - state_sha_or_handoff_repair_required
      - failed_merge_push_or_cleanup
      - task_policy_requires_persistent_evidence
      - downstream_gate_requires_file_evidence
standingUnattendedLocalCloseoutApproval:
  statePath: docs/04-agent-system/state/project-state.yaml
  durableKey: automation.unattendedControl.standingUnattendedLocalCloseoutApproval
