    - provider_call
    - provider_configuration
    - dependency_package_lockfile_change
    - schema_migration
    - destructive_database_operation
    - e2e
    - external_service
    - deploy
    - payment
    - authorization_model_change
    - pr
    - force_push
    - cost_calibration_gate
