    - src/db/schema/**
    - drizzle/**
    - e2e/**
    - playwright-report/**
    - test-results/**
  capabilities: &low_risk_capabilities
    localSourceChange: approved
    focusedUnitTest: approved
    schemaMigration: blocked
    databaseConnection: blocked
    providerCall: blocked
    envSecretAccess: blocked
    dependencyIntroduction: blocked
    browserRuntime: blocked
    devServer: blocked
    e2eRuntime: blocked
    stagingProdDeploy: blocked
    paymentExternalService: blocked
    forcePush: blocked
    pr: blocked
    costCalibrationGate: blocked
  closeoutPolicy: &low_risk_closeout_policy
    localCommit: approved
    fastForwardMerge:
      approved: true
      targetBranch: master
    push:
      approved: true
      target: origin/master
    cleanup:
      deleteShortBranch: true
  validationCommands: &low_risk_validation_commands
    - npm.cmd run lint
    - npm.cmd run typecheck
    - git diff --check
    - powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\scripts\agent-system\Test-ModuleRunV2PreCommitHardening.ps1 -TaskId TASK_ID
