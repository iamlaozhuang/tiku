    humanApproval: >-
      User authorized organizing and executing a serial mechanism task to fix all remaining Module Run v2 control-loop
      card points found during self-check. During bounded stopped-automation cleanup, git worktree removal exposed a
      partial cleanup gap: Git registration can disappear while a non-Git orphan automation worktree directory remains.
      Scope is local mechanism scripts, smoke tests, SOP/state/schema/index updates, evidence, audit review, paused
      Codex automation prompt alignment, safe cleanup of detected automation-root residue through the governed hygiene
      script, local commit, fast-forward merge to master, push origin/master, and short-branch cleanup after validation.
      This does not approve product implementation, dependency/package/lockfile changes, env/secret writes, real
      provider calls, real local Docker DB operations, project material/paper/paper_asset resource reads for tests,
      schema/migration, e2e, staging/prod/cloud/deploy, payment, external-service, PR/force push, destructive DB
      operation, or Cost Calibration Gate execution.
    closeoutPolicy:
      localCommit: approved
      fastForwardMerge:
        approved: true
        targetBranch: master
      push:
