p1ExecutionPolicy:
  schemaVersion: "1.1"
  policyId: P1_EXECUTION_POLICY_CAPSULE_V1_1
  status: active
  effectiveScope: current_active_p1_goal
  source:
    kind: durable_user_instruction
    registeredAt: "2026-07-21"
    supersedes: P1_EXECUTION_POLICY_CAPSULE_V1
    approvalReferences:
      lowRiskCloseout: current-user-low-risk-p1-goal-closeout-standing-approval-2026-07-20
      boundedMediumRiskCloseout: standing-bounded-medium-risk-closeout-approval-2026-07-20
      testOnlyAllowlistExpansion: standing-test-only-allowlist-expansion-2026-07-21
      v1_1StateOnlyImplementation: START_P1_EXECUTION_POLICY_CAPSULE_V1_1
  supersededPolicies:
    - policyId: P1_EXECUTION_POLICY_CAPSULE_V1
      status: superseded
      source: durable_user_instruction_registered_2026_07_21
      retainedAs: historical_policy_source_not_active_authorization
  effectiveUntil: current_p1_goal_complete_cancelled_or_policy_revoked
  revocationConditions:
    - current_p1_goal_complete_or_cancelled
    - user_revocation
    - canonical_origin_change
    - minimal_safety_kernel_semantic_change
  rules:
    rootCausePackaging:
      - RC_and_root_cause_clusters_schedule_work_and_share_context_only
      - each_finding_requires_independent_acceptance_evidence_and_closure
      - bundle_only_findings_with_one_confirmed_authoritative_path_invariant_failure_mechanism_fix_validation_matrix_risk_and_review_boundary
    preRedImpactScan:
      timebox: minutes_not_repository_wide_planning
      authoritativeChain:
        - UI_or_API_caller
        - route_or_handler
        - service
        - repository
        - schema_or_migration
        - direct_tests_mocks_and_fixtures
      contractFields:
        - coreFiles
        - contingencyFiles
      requirements:
        - scan_the_complete_authoritative_chain_before_first_approval_and_RED
        - write_current_task_coreFiles_and_contingencyFiles_once_before_freeze
        - add_every_validation_command_direct_test_path_to_allowedFiles_before_RED
        - prepare_only_the_current_task_and_do_not_prebuild_future_task_contracts
    scopeAndFreezePreparation:
      - inventory_predictable_product_files_test_files_and_risk_categories_once
      - complete_formatter_generated_artifacts_and_test_scope_before_candidate_freeze
      - forecast_only_the_next_one_to_three_tasks_without_materializing_their_contracts
    sameTaskAuthoritativeCallChainAllowance:
      maxAdditionalProductSourceFiles: 2
      allConditionsRequired:
        - same_task_finding_or_RC_objective_root_cause_risk_category_and_business_domain
        - direct_caller_or_callee_evidence_from_the_frozen_authoritative_chain
        - only_parameter_header_mutation_context_idempotency_retry_or_error_contract_propagation
        - record_exact_paths_and_call_chain_evidence_in_task_safety_before_editing
        - no_new_capability_permission_schema_dependency_provider_external_effect_or_independent_root_cause
        - run_corresponding_focused_tests_lint_and_typecheck
      freshApprovalRequiredWhen:
        - more_than_two_product_source_files
        - cross_domain_or_indirect_call_chain
        - new_independent_root_cause
        - new_or_changed_high_risk_category
    futureHighRiskConditionalCloseout:
      effectiveForApprovalsIssuedAfter: P1_EXECUTION_POLICY_CAPSULE_V1_1
      retroactive: false
      doesNotReinterpretTasksThrough: p1-remediation-rc-04-resource-upload-saga-2026-07-21
      requiredEnvelopeFields:
        - taskId
        - RC_or_finding
        - riskCategory
        - coreFiles
        - contingencyFiles
        - allowedOperations
        - explicitlyForbiddenItems
        - canonicalPushTarget
        - conditionalCloseout_true
      conditionalCoverage:
        - implementation
        - one_reviewable_commit
        - ff_only_merge_to_master
        - one_canonical_origin_master_push
        - sync_verification
        - cleanup
      coverageConditions:
        - implementation_remains_inside_the_approved_envelope
        - formatter_preapplied
        - validation_and_main_thread_adversarial_review_green
        - base_and_remote_unchanged
      deltaFreshApprovalRequiredWhen:
        - file_or_risk_outside_the_approved_envelope
        - new_capability
        - base_or_remote_drift
        - semantic_change_after_validation_or_review
    approvalDeduplication:
      pendingApprovalFingerprintFields:
        - taskId
        - rootCause
        - riskCategory
        - exactScope
        - requestedOperations
        - baseSha
      rules:
        - only_one_active_request_per_identical_fingerprint
        - unchanged_evidence_must_not_trigger_reapplication_rechecking_or_restatement
        - report_only_incremental_evidence
        - durable_wait_sends_one_request_then_parks_without_repeat_turns
        - a_later_user_or_coordinator_message_resumes_the_same_Goal_without_creating_a_new_Goal
    testOnlyExpansion:
      approvalId: standing-test-only-allowlist-expansion-2026-07-21
      boundaries:
        - tests_fixtures_or_src_test_spec_only
        - no_weakened_assertions_or_product_scope_expansion
        - no_product_source_schema_dependency_configuration_or_mechanism_change
    taskStartup:
      - reread_p1ExecutionPolicy_before_each_new_task
      - write_only_applicable_approval_ids_into_that_tasks_task_safety_contract
      - chat_summaries_and_old_task_plans_are_not_authorization_SSOT
    metrics:
      observationWindow: next_three_product_tasks
      fields:
        - mandatoryFreshApprovals
        - preventableScopeMissApprovals
        - candidateReapprovals
        - approvalWaitTurns
        - productValueTime
        - mechanismOverhead
        - guardSmokeChanges
      accounting:
        mechanismOverheadIncludes:
          - waiting
          - diagnosis
          - repeated_commands
          - coordination
        fabricatedResultsForbidden: true
    closeoutStateConsistency:
      - separate_current_state_trigger_conditions_and_projected_outcome
      - never_record_unperformed_commit_push_sync_or_cleanup_as_actual_fact
      - successful_terminal_evidence_is_the_actual_closeout_proof
      - next_task_start_only_verifies_closeout_facts_and_does_not_reopen_candidate_approval
      - a_closed_task_must_not_retain_pending_approval_waiting_tree_binding_or_in_progress_disposition
    freshApprovalRequired:
      - dependency_or_package_or_lockfile_change
      - schema_or_migration_change
      - persistent_database_write_or_real_data_access
      - permission_or_authorization_business_semantic_expansion
      - real_provider_or_external_service_call_or_configuration
      - credential_or_secret_env
      - deployment_or_pull_request_or_force_push_or_noncanonical_remote
      - approval_envelope_drift_or_the_same_task_call_chain_allowance_failure
      - capsule_or_minimal_safety_kernel_semantic_change
