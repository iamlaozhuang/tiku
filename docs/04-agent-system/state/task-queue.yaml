      - F-0121 publish consumes only the server-owned draft snapshot at the expected revision and cannot accept client-owned question, evidence, count, score or authorization lineage as published truth.
      - F-0123 one draft creates at most one immutable version in one transaction; same operation replays the same result and stale, different-operation or concurrent publish attempts return a recoverable conflict.
      - F-0145 employee save and submit accept only versioned answer items plus revision and operation id; the server validates question and option ownership, computes answered count and objective score, and creates a durable short-answer scoring task without trusting client scores.
      - Draft/version, answer/scoring-task and scoring-task/answer completion transitions are atomic and rollback on partial failure.
      - Organization analytics consumes only terminal server-scored submitted answers and excludes scoring, failed, inconsistent or null-score rows.
