boundaryStatement: >-
  This packet binds the existing preview owner acceptance checklist and naming packet to a staging boundary decision
  surface. It records laozhuang as the non-sensitive single owner reference and records no contact details,
  credentials, or account identifiers. It creates or disables no accounts, creates or changes no staging resources,
  reads or writes no env/secret files, runs no Provider/model calls, connects to no database, runs no
  schema/migration/seed/data mutation, starts no dev server, runs no browser/e2e, deploys nothing, creates no PR,
  performs no force push, changes no dependencies, touches no payment/external service, mutates no org_auth runtime
  behavior, declares no previewReleaseReady/productionReady status, and leaves the Cost Calibration Gate blocked.
