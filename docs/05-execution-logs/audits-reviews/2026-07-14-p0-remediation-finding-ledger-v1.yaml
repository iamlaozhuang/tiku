    title: 管理员登录失败计数和锁定状态仅存于进程内存，无法满足五次失败锁定十五分钟
    problemEssence: admin模型未物化登录失败状态，默认仓储用进程内Map补齐接口语义；服务层测试验证了算法，却未验证默认运行时在重启和多实例拓扑下的安全不变量。
