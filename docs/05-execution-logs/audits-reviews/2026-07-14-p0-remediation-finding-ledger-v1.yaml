    affectedModulesFilesClassesFunctionsOrApis:
      - src/server/services/employee-account-service.ts:66-135 单建与绑定只做输入、organization和手机号/绑定检查，没有quota契约或错误分支。
      - src/server/repositories/admin-organization-org-auth-runtime-repository.ts:1579-1790 的新账号创建和既有账号绑定事务直接写user/employee，没有lockOrgAuthQuotaScope、额度计数、account_quota比较或used_quota刷新。
      - src/server/repositories/admin-organization-org-auth-runtime-repository.ts:1096-1154 的既有用户单建路径同样直接插入employee；2660-2804 的批量绑定路径在事务内循环写入，但完全没有额度校验。
      - src/server/services/admin-organization-org-auth-runtime.ts:648-704 的账号导入逐行调用同一无额度保护服务，因此可部分成功且并发超额。
      - src/server/repositories/admin-flow-runtime-repository.ts:799-817 的用户重新启用仅把status改为active，没有识别employee、校验相关授权额度或刷新used_quota；员工停用路径也未刷新额度摘要。
      - src/server/repositories/admin-organization-org-auth-runtime-repository.ts:1261-1329 虽逐条检查调入组织授权，但以hasTargetQuota实现“任意一条有余量即可”，而员工会继承该组织覆盖的全部有效授权。
      - src/server/repositories/student-authorization-redeem-runtime-repository.ts:118-153 的组织有效授权查询只校验绑定与user状态，不读取account_quota、used_quota或额度占用结果。
    violatedBusinessInvariants:
      - docs/01-requirements/modules/01-user-auth.md:359-371 规定覆盖范围内active员工占用总账号额度，创建/启用必须拒绝超额，且额度校验必须在数据库层原子执行。
      - docs/01-requirements/stories/epic-01-user-auth.md:198-214 将企业授权额度原子防超额列为P0验收标准。
      - catalog/roles/super-admin.yaml与ops-admin.yaml中的UC-SUPER-005、UC-OPS-005要求员工单建/导入原子占用org quota。
    riskConsequence:
      businessImpact:
        企业购买的account_quota不能约束后续员工生命周期。平台运营可通过单建、重新启用、把个人账号绑定为员工、两种导入路径，或调入一个“至少一条授权尚有额度但其他授权已满”的组织，使任意数量的active employee继承覆盖组织的standard或advanced
        org_auth。数据库中的used_quota不会随创建/启停可靠刷新，也不参与有效授权查询，导致商业授权额度被稳定绕过并可能让运营界面长期显示虚假的剩余额度。
      blastRadius: 所有通过super_admin或ops_admin单建、启用、绑定、导入或调动进入组织的员工，以及覆盖这些节点的全部standard/advanced org_auth；多实例、批量导入和多专业/等级授权会放大超额和used_quota陈旧。
