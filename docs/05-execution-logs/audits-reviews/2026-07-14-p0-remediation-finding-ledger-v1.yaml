  - findingId: F-0005
    title: 员工创建、启用、绑定、导入和部分调动绕过企业账号额度，且有效授权查询不校验超额状态
    problemEssence: 额度实现从“员工生命周期的授权不变量”退化为org_auth创建时的初始统计和UI摘要；后续员工写入口由独立employeeAccountService及历史兼容repository分叉，未共享同一原子quota command。
    originalEvidence:
      status: validated
      riskLevel: P0
      sourcePacketId: AP-SF-002
      baselineId: baseline-2026-07-14-01
      baselineCommit: 7aac83765ca4b650b73b1612013e26a0111775ae
      runtimeEvidenceNeeded: false
    roles:
      - super_admin
      - ops_admin
      - org_standard_employee
      - org_advanced_employee
    useCases:
      - UC-SUPER-003
      - UC-SUPER-005
      - UC-SUPER-006
      - UC-OPS-002
      - UC-OPS-005
      - UC-OPS-006
      - UC-OPS-007
      - UC-ORGSTDEMP-002
      - UC-ORGADVEMP-002
    businessChain:
      - 某有效org_auth的account_quota已经用满，或两个并发请求只剩一个可用名额。
      - 调用员工单建/导入/启用接口，或调动到同时存在多条授权且仅部分有余量的组织；创建与启用路径不做额度校验，调动路径只要求任意一条目标授权有余量。
      - 新user/employee被写成active employee，相关org_auth.used_quota没有刷新；并发请求也没有共享数据库锁。
      - effective authorization查询只按employee组织绑定、user类型/状态和org_auth状态/有效期求交，不读取account_quota或used_quota，因此超额员工获得与额度内员工相同的组织授权能力。
    horizontalCapabilities:
      - SC-EFFECTIVE-AUTHORIZATION
      - SC-ORG-SCOPE-ISOLATION
      - SC-EDITION-QUOTA-CONTEXT
      - SC-ATOMICITY-IDEMPOTENCY
