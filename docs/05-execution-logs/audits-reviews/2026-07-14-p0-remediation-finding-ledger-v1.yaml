      - 每个实例只在模块级Map中累计该实例见到的失败次数；数据库admin表没有失败计数或锁定时间字段。
      - 请求跨实例分散或实例重启后，计数从零开始；已形成的锁定也随进程消失。
      - 服务层五次失败策略本身仍返回正确业务状态，但生产运行时没有持久、共享、原子计数载体。
