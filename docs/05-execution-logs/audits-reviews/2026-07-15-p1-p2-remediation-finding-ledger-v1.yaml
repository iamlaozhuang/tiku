    businessImpact: "完整题目或组卷结构只在本次同步响应区以只读卡片显示；任务历史无论实际内容都显示固定“生成草稿已创建，待评审查看”，只展示evidence和citation数量，不渲染持久reviewedDraft、引用资料名称或章节路径。历史评审面没有任何字段编辑器，“编辑草稿、驳回草稿、采用到内容草稿、进入发布校验”四项中的前后两项只是span标签；真正可点击的只有采用和驳回。刷新、换设备或离开页面后，用户可以在看不到完整草稿的情况下把隐藏reviewedDraft直接提交采纳，却不能先复核、修正、执行重复检查或验证引用；正式草稿详情入口要到采用后才出现，颠倒了“review→edit→validate→adopt”的治理顺序。"
    originalRootCauseHypothesis: "隐私脱敏目标被实现为历史列表永远只显示固定摘要，而完整草稿仅作为隐藏字段供提交；后续用静态“下一步”标签描述尚未装配的工作台能力，未建立受权detail、editable revision和引用安全投影。"
    originalBlastRadius: "内容AI题目/试卷及组织AI训练题/试卷的跨会话评审、编辑、重复检查、引用核验、驳回/采用或复制决策、员工视角预览、发布前校验及审计可信度；super_admin进入相应内容或组织能力时同样受影响。"
    originalRuntimeEvidenceNeeded: "false"
    originalNextAction: "修复线程应提供按角色鉴权的AI result detail和版本化编辑草稿，历史可重新打开完整安全投影及资料名称/章节路径；编辑、diff、重复检查、校验、驳回、采用必须是真实命令或入口。采用只消费当前服务端revision，UI以服务端状态为准。补刷新换设备、多人审阅、字段编辑、引用查看、重复检查、脏离开、冲突和键盘可达性测试。"
