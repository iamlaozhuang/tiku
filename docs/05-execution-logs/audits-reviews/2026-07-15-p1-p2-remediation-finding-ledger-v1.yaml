    businessImpact: "代码会在下一次读取、保存或重新开始练习/考试时发现授权已过期并终止对应记录，因此不能继续通过正常接口作答；但基线中没有按authorization.expires_at触发的调度、队列或数据库机制。在用户不再请求的情况下，practice、mock_exam和未提交企业训练可能长期保留为进行中；同一过期org_auth在运营列表仍显示和筛选为active，组织树授权摘要甚至不校验status或时间。用户访问判定、运营状态和组织摘要由三套时序规则驱动，偏离“自然到期立即失效”的状态合同并污染运营判断、统计、恢复入口和终止审计。是否存在仓库外受管调度器仍需运行时/部署证据裁定。"
