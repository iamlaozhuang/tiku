    businessImpact: "每个AI result和target只允许一条formal adoption记录，但唯一键与复用查询都不包含reviewDecision、reviewer或revision；第一次approve或reject成为永久状态，后续相反决定不会形成冲突、版本或新评审事件。尤其先approve再直接POST reject时，repository复用已approved记录，service因本次请求是reject而直接返回code=0，浏览器又按请求参数显示“已驳回”，数据库和刷新后的持久事实仍是approved或draft_created。先reject再approve则在更下游才失败。用户看到的状态、API成功语义和审计记录因此不一致，无法安全处理误操作、复核、重复点击或响应丢失。"
