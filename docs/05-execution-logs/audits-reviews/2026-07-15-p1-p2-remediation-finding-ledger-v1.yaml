    attackOrFailurePath:
      - "攻击者获知某管理员手机号后调用公开POST /api/v1/users，并选择自己的密码。"
      - "注册服务只查询user表，未查询admin表；数据库也只在各表内部建立手机号唯一索引，因此注册可成功。"
      - "后续POST /api/v1/sessions先查询user表，命中攻击者创建的学员账号后不再查询同手机号管理员账号。"
      - "管理员使用原密码登录时对学员凭据校验失败，无法进入后台；攻击者只能进入自己的学员域，但可稳定阻断管理员登录。"
