    businessImpact: "AI scoring service把Provider/runner返回数组逐项映射并求和，只把每项分数夹在同public id的满分内；它不要求每个正式评分点恰好出现一次、不拒绝重复public id，也不为缺失点补零或判失败。模型若重复一个高分point两次、遗漏其他point或混合未知point，服务仍返回scored；只在最终合计上按整题满分截断。重复point可占用本应属于其他规则的分值并抬高成绩，缺失point又让评分证据无法与正式规则逐项对账。"
    originalRootCauseHypothesis: "输出规范化只实现数值层防御，把Provider数组当作已经满足评分点集合合同；缺少以正式评分点map为基准的解析器、重复检测、缺失补零/拒绝和结构失败分类。"
    originalBlastRadius: "接入真实Provider或任何可变runner后的所有主观题正式成绩、attempt成功率、报告逐点解释和争议复核；多评分点题比单点题风险更高。"
    originalRuntimeEvidenceNeeded: "false"
    originalNextAction: "修复线程应在Provider响应进入业务结果前执行严格schema：返回id集合必须与正式评分点集合一一对应，拒绝重复/未知，明确缺失点是补0还是整次失败并记录结构错误；逐点和合计都以同一不可变规则校验。补重复、缺失、未知、乱序、空数组、NaN/非数值、超分和正常乱序等反向测试。"
