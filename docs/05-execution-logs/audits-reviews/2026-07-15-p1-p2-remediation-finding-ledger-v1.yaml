      - "学员个人中心点击退出仅删除localStorage标记并把React状态改为unauthorized，未调用DELETE /api/v1/sessions。"
      - "浏览器仍自动携带HttpOnly Cookie；重新打开或刷新受保护页面时，服务端再次识别原会话。"
      - "后台端虽然调用DELETE，但不检查response.ok、响应code或失败状态，并在finally中始终清标记、切换未登录UI和跳转。"
