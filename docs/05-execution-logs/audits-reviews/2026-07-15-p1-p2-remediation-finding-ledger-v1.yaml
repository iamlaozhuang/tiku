    deepRevalidationRequired: true
    staticClosureClaimed: false
    businessInvariant: "系统必须阻止原 finding 所述失效模式：AI出题共享解析器把不完整文本或残缺JSON标记为已解析，下游静默丢题后仍形成成功结果"
    businessImpact: "当前AI出题成功门禁只要求共享structured preview为parsed。纯文本只要出现与请求题量相同的题号，就会被当作已解析，但生成的draft summary不含题型、题干、选项、答案或解析；JSON路径也只强制题量及可选题型/难度匹配，不强制每道题具备可评审的完整字段。后续内容端只取第一道可用题，组织端和个人学习端则过滤残缺题并只要求至少剩一道；请求3或10题可以最终只得到1题，甚至任务与结果显示成功但没有任何可采纳/可作答题目。Provider非确定输出因此可突破受保护的题量和完整草稿合同，各角色历史与实际业务产物分叉。"
    originalRootCauseHypothesis: "为兼容历史Provider纯文本和多种JSON字段别名，structured preview被设计为宽松展示摘要而非强schema；后来同一parseStatus被复用为持久化、采纳和学习会话的业务门禁，却没有增加逐题完整性和消费后题量守恒。"
