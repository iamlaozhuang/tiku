    businessImpact: "两个首次创建请求会先各自读到session不存在并基于各自输入构造snapshot；数据库以public id唯一键让一个插入胜出，另一个onConflict后能读到胜者行，但repository丢弃该返回值，service仍向败者客户端返回本地未持久化session。若题目输入或正式题源在两请求间不同，页面展示/提交的session question与数据库评分快照不一致。答案又按session+question无条件upsert，不比较submittedAt或版本，较旧设备/较慢请求可在较新答案后落库并覆盖它，破坏恢复和统计确定性。"
    originalRootCauseHypothesis: "repository把insert-or-reuse当成无返回值副作用，service把本地对象误认为提交后的权威事实；答案保存同样只做数据库upsert，没有把客户端时间/版本转化为受控并发协议。"
