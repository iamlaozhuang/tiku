    businessImpact: "代码虽然持久化owner与idempotency key唯一约束，但后台AI链在Provider调用和组卷选择完成后才createOrReuse任务；学员链即使已识别reused任务也仍进入Provider执行。后台每次请求由服务端生成随机requestPublicId，学员UI每次提交也生成新的request/task/idempotency标识，因此响应丢失后的人工重试不会命中原任务。相同意图可重复消耗Provider成本和组织/个人额度，并产生多个结果或用新输出覆盖同一任务的可见语义。"
    originalRootCauseHypothesis: "幂等被建模为结果持久化去重，而不是外部调用前的任务认领协议；同时业务意图键由每次尝试随机生成，缺少客户端稳定重试标识和payload digest冲突校验。"
    originalBlastRadius: "四类高级AI使用者的AI出题、AI组卷、RAG检索、结构化生成和本地选题；网络不稳定与高成本模型场景影响最大。"
