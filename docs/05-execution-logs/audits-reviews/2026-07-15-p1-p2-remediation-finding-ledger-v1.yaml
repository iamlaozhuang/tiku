    businessImpact: "用户提交的difficulty和结构化knowledgeNodePublicIds进入Provider请求，但paper plan解析只把题量、题型分布、结构和题源偏好与请求对账；Provider返回的difficultyGoal、各section difficulty、knowledgeNodePublicIds及knowledgeCoverage只要形状合法就被采用。一个结构正确但把medium改为hard、把知识点A改为B的计划仍会成功驱动本地选题。平台候选可能先被原请求A预过滤，选择器却按计划B进行exact/nearby并最终以same_scope降级；企业候选本就缺知识与难度元数据。结果容器又不保存目标难度或知识覆盖，用户只能看到数量和降级等级，无法证明最终试卷遵循原配置。"
    originalRootCauseHypothesis: "paper plan被当作Provider可自由生成的目标规格，而不是用户约束下的派生结构；校验器只实现了近期新增的题量、结构和题型守恒，没有统一字段血缘策略规定哪些字段必须等于请求、哪些只能是请求集合的子集、哪些允许模型补充。"
    originalBlastRadius: "内容、个人及组织AI组卷的难度目标、选定知识点、后代范围、匹配质量、题源不足判断和历史可解释性；同一共享assembly服务使所有四类生产入口受影响。"
