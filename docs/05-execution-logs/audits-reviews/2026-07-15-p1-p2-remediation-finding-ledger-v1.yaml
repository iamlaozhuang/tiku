    businessImpact: "当同一用户在同一profession和level下存在多条有效标准版personal_auth时，符合条件的edition_upgrade卡密没有任何目标选择入口或API字段，兑换必然失败；系统还把“需要选择目标”误报成“卡密已使用”，使用户无法完成已购升级、运营无法判断真实原因，并可能诱发重复发卡或错误客服处置。"
    originalRootCauseHypothesis: "修复edition_upgrade基本写链时只实现了“唯一候选自动绑定”，把多候选需求退化成null；输入契约、错误分类、UI选择和审计字段没有随需求一起扩展，提示文案先于实际交互落地。"
    originalBlastRadius: "所有可能因续费、补发、迁移或历史数据形成同范围多条有效standard personal_auth的个人学员和组织员工；四类学员共用同一卡密兑换页面与API，super_admin和ops_admin发出的升级卡会在该合法状态下不可用。"
    originalRuntimeEvidenceNeeded: "false"
    originalNextAction: "修复线程应以personal_auth公开标识扩展预览、确认、兑换API、service、repository、UI和audit；仅在唯一候选时允许省略目标，多候选返回可操作的专用业务状态且不得消费卡密，并补并发与错误映射回归。"
