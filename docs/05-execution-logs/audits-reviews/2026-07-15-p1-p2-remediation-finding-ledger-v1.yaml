    businessImpact: "同时拥有个人授权和企业授权的员工，如果其正在进行的practice或mock_exam实际使用personal_auth，运营取消同profession/level的org_auth仍会把该会话标记terminated；停用员工所属组织时，另一条路径会终止该组织员工的全部范围。有效个人权益被无关的企业管理动作误伤，当前作答进度中断；记录没有授权来源快照，组织停用路径还不写termination_reason，事后无法证明终止是否正确，也无法安全重放或补偿。"
