    businessImpact: "后台AI历史先分页查询包含pending/running/failed/cancelled/succeeded的全部任务，再用完全相同的page/offset独立分页查询只包含draft结果的子集合，最后仅在当前两页内按taskPublicId拼接。只要某页边界前出现没有结果的失败或未完成任务，后续成功任务在“全部任务”中的序号与其结果在“成功结果子集”中的序号就不同；结果会在任务尚未出现的前一结果页被读取并丢弃，到任务所在页又已被offset跳过。该成功历史项永久显示无generatedResult，组织管理员无法复核或复制合法训练草稿，内容管理员也无法评审/采纳，分页越多故障越稳定。"
    originalRootCauseHypothesis: "history read model把任务列表和结果列表当作两个可以共享分页参数的等长投影，没有以“任务页”为主集合按其result/task public ids批量加载关联结果，也没有数据库join或稳定游标保证一一对应。"
    originalBlastRadius: "内容后台和组织后台AI出题/组卷历史；失败率、pending积压和历史页数越高，合法成功结果、评审/复制入口及恢复能力丢失越多，并会与任务total和状态形成难以诊断的假空结果。"
    originalRuntimeEvidenceNeeded: "false"
    originalNextAction: "修复线程应以分页后的任务public ids为唯一主集合，在同一查询中left join结果，或按当前任务task/result public ids无分页批量加载；结果排序不得参与任务分页。补pageSize边界前后不同数量的pending/failed/cancelled/succeeded、结果迟到、完成顺序逆转、空结果和多页守恒测试。"
