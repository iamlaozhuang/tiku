    businessImpact: "组织AI组卷把候选与选中项建模为独立question public id，没有material或question_group身份、成员关系与组级顺序。平台正式题行明明包含material_public_id，但组织管理员结果快照映射显式写入materialTitle=null、materialContent=null；员工私有自测source/session合同也完全没有材料或题组字段。材料题可被单独选中并脱离共同材料，多个共享材料的子题会在paper_section中被当作互不相关的题平铺；题干可能无法理解，员工预览、作答、评分和管理员后续训练草稿都不能恢复组级语义。企业训练来源虽逐题复制material正文，也不保留稳定question_group身份，仍无法证明整组选择和小计关系。"
