    businessImpact: "创建函数在请求前设置isCreatingAdminAccount=true，但只有await成功解析JSON后才清除，没有try/catch/finally。断网、代理错误、连接中断或非JSON响应会让按钮永久显示“创建中”；用户重置密码、停用和启用也复用直接response.json的postAdminApi，并由void调用无错误边界，失败时确认框保持原状且没有提交中、未知结果或恢复提示。若服务器已提交账号/密码/状态而响应丢失，页面无法判断结果，重试会产生冲突、再次换密或重复安全副作用。"
    originalRootCauseHypothesis: "创建UI把“收到标准JSON响应”当成请求唯一终态，没有统一mutation状态机、finally清理和可查询operation标识；错误文案又直接透传服务端技术字符串。"
