    deepRevalidationRequired: true
    staticClosureClaimed: false
    businessInvariant: "系统必须阻止原 finding 所述失效模式：退出登录未可靠终止服务端会话，学员端仅清除本地标记且后台端对注销失败仍宣告成功"
    businessImpact: "学员在共享设备点击“退出登录”后，HttpOnly会话Cookie仍然有效；重新加载受保护页面即可恢复原身份，造成明确的错误安全感和后续使用者越权访问风险。后台虽调用注销接口，但无论HTTP或业务结果如何都清理本地状态并跳转登录页；若服务端删除会话或过期Cookie失败，也会向管理员呈现已退出的假象。"
    originalRootCauseHypothesis: "前端把可见UI状态和localStorage兼容标记误当成认证会话状态；退出用例未以“服务端凭据已撤销且Cookie已过期”作为完成不变量，测试也只验证页面切换。"
    originalBlastRadius: "四类学员/员工角色存在稳定复现的共享设备会话残留；五类后台管理员在注销请求失败时存在同类假退出风险，高权限会话会放大后果。"
    originalRuntimeEvidenceNeeded: "false"
    originalNextAction: "修复线程应统一九角色注销客户端，只有服务端撤销或明确的安全降级完成后才宣告退出；同时确保失败路径仍使Cookie过期或给出非误导提示，并增加刷新、共享设备、网络/数据库失败回归。"
