    businessImpact: "卡密批次在一个数据库事务中创建并提交后，handler才用另一条独立写入追加audit_log，且请求契约没有客户端幂等键。若审计写失败，调用方收到服务器错误而拿不到本次分发窗口中的卡密明文，但数据库里卡密已是可兑换的unused状态且没有成功审计；调用方安全重试会生成另一批新卡，造成超发、未分发可用秘密和无法完整追踪的商业授权风险。"
    originalRootCauseHypothesis: "卡密生成把audit_log视为响应前的附加副作用，而不是与商业权益创建同一受治理命令的一部分；批次ID完全由服务端随机生成，客户端没有可稳定重试的业务标识。"
