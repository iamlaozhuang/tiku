    businessImpact: "组织管理员直接请求organization/org_auth、内容、资源/RAG、audit_log/ai_call_log/model/prompt等全局API时，权限边界确实fail-closed且没有repository副作用；但多组runtime在鉴权解析阶段先删除org角色，随后把仍有效的会话返回为“admin session required”。客户端或支持工具会把授权拒绝误判成会话失效，可能清除有效会话、反复要求登录或掩盖真正的角色边界，也无法提供组织概览安全返回路径。"
    originalRootCauseHypothesis: "每个业务runtime把“可识别的后台角色集合”和“该域允许的角色集合”合并成同一个TypeScript过滤器，导致身份认证与权限授权在解析阶段被错误折叠。"
    originalBlastRadius: "组织管理员对全局organization/org_auth、用户/日志、内容、资源/RAG、模型和Prompt API的直接拒绝体验、客户端会话恢复和支持诊断；数据边界当前仍fail-closed。"
    originalRuntimeEvidenceNeeded: "false"
    originalNextAction: "修复线程应先解析所有合法后台角色和有效会话，再由每个端点执行显式授权并返回统一permission-denied业务code/HTTP语义与组织概览安全指引；保持对象不存在与跨范围信息不泄漏。补两类组织管理员对全部全局API族的无副作用拒绝矩阵及客户端不清会话测试。"
