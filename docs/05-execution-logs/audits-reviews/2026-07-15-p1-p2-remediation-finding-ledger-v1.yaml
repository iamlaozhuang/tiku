    businessInvariant: "系统必须阻止原 finding 所述失效模式：AI讲解提示的fallback只在主模型预先停用时选中，运行中主模型失败不会自动尝试备用模型"
    businessImpact: "需求要求客观题讲解和提示在主模型调用失败后自动尝试配置的备用模型，只有两者均失败才返回暂不可用。当前resolver只在主配置isEnabled=false时提前选择fallback；只要主配置启用就永远返回primary。解释/提示service随后只持有一个runner和一个已选model snapshot，runner抛错即直接返回unavailable并写一次失败日志，不会解析或调用fallback。真实Provider超时、限流、权限故障或结构异常时，本可恢复的讲解/提示全部失败，配置页面和测试展示的“fallback”语义与运行时容灾合同不一致。"
    originalRootCauseHypothesis: "模型治理层把fallback理解成“主配置不可选时的静态替代”，而业务需求定义的是“已选主模型执行失败后的第二次调用”；resolver与runner之间没有attempt orchestrator、失败分类或每次尝试日志关联。"
    originalBlastRadius: "四类学员的练习AI讲解、主观题提示和错题AI讲解，以及模型治理、失败率、可用性和fallback成本统计。"
    originalRuntimeEvidenceNeeded: "false"
    originalNextAction: "修复线程应为讲解/提示建立受控attempt orchestrator：锁定primary与合法fallback snapshot，按批准的可重试失败类别先primary再fallback，每次attempt分别记录模型、Token、耗时和脱敏错误，并把最终结果关联同一业务请求；主观评分保持单模型。补primary成功、primary失败fallback成功、双方失败、不可重试4xx、超时、结构错误、模型配置变更中途及重复请求测试。"
