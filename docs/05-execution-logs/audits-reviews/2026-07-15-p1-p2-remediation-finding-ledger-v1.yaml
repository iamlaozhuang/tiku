    businessInvariant: "系统必须阻止原 finding 所述失效模式：公共注册未校验管理员账号域手机号，允许跨账号域冲突并劫持登录选择顺序"
    businessImpact: "已存在管理员手机号仍可被未认证调用方注册为学员账号；此后登录按user表优先命中，管理员正确密码会在错误账号上校验并被拒绝，形成可远程触发的管理员登录拒绝服务。管理员创建与公共注册并发时还可能同时越过各自的先查后写校验，持续破坏跨账号域唯一性。"
    originalRootCauseHypothesis: "跨账号域手机号唯一性被实现为两个业务入口各自的应用层预查，而不是共享身份边界上的单一、原子、可并发强制的不变量；公共注册入口还漏掉了admin域查询。"
    originalBlastRadius: "所有后台管理员角色的登录可用性；超级管理员/运营管理员创建后台或组织管理员账号与个人注册的并发交接；后续按手机号定位账号的重置、审计和运维流程也存在歧义风险。"
    originalRuntimeEvidenceNeeded: "false"
    originalNextAction: "在修复线程中把手机号登录身份收敛到可原子强制的共享身份键；至少同时修补公共注册双域检查、并发竞态和冲突错误映射，并增加管理员手机号反向碰撞与并发测试。"
