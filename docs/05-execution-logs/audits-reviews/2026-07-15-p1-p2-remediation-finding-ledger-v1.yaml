    businessImpact: "一次“创建企业训练草稿”先POST新draft，再POST来源上下文；两次请求由浏览器串行编排，没有共同事务、copy intent id、payload digest或补偿。第一步成功而第二步失败、超时、会话失效或响应丢失时，数据库已留下无来源上下文的active metadata draft，但UI只显示整次失败；用户重试会创建另一个新draft。draft表对sourceTaskPublicId只有普通索引，来源唯一约束也只在单个draft内部，因此同一AI结果可形成任意多个孤儿或重复草稿，管理员无法从历史项判断已复制事实，后续编辑、发布和审计时间线产生歧义。"
    originalRootCauseHypothesis: "训练草稿和来源上下文被当作两个可组合REST资源，由前端承担工作流协调；没有以“采用某AI结果”为聚合命令和数据库事务边界，也没有稳定业务幂等键关联重试。"
    originalBlastRadius: "所有组织AI出题和AI组卷结果复制为企业训练草稿的网络失败、服务故障、刷新重试和并发操作；会累积不可丢弃草稿并使同一AI结果的后续版本、发布和审计归因不确定。"
