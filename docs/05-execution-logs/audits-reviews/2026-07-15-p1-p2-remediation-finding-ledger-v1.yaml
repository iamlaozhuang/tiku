    businessImpact: "AI组卷本地选题声称从角色允许的正式题源中按结构筛选，但平台题源解析把page固定为1、pageSize最大100并按updatedAt倒序，既不循环分页也不按组卷计划的各题型/难度一次性查询完整候选。题库超过100题时，较早更新但完全匹配知识点和题型的题目不可见；计划最多80题，前100题稍有类型分布不均就会错误返回insufficient，即使全库存在足够题源。个人AI组卷结果之后创建学习session又重新只取前100题解析已选publicId，分页窗口变化还能让已成功组装的结果无法开始训练。"
    originalRootCauseHypothesis: "通用后台列表接口被直接复用为组卷候选源，100条被当成性能保护和足量样本；没有为选题建立可流式分页、按约束计数或按选中publicId批量回读的专用repository合同。"
    originalBlastRadius: "内容、个人和组织三域全部AI组卷，本地选择、题源不足诊断、历史恢复和学习session；题库越大、分布越不均或更新越频繁，误判概率越高。"
    originalRuntimeEvidenceNeeded: "false"
    originalNextAction: "修复线程应建立专用AI组卷候选查询：由数据库按profession/level/subject/status、题型、知识范围和允许来源执行稳定游标分页或集合查询，直到满足计划或证明全量不足；结果记录候选完整性和查询水位。学习session按已选publicId批量读取并使用结果时快照，不得重走第一页窗口。补101/1000题、稀疏题型、并发更新和跨页去重测试。"
