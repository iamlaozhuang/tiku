    businessImpact: "平台正式题型有七种canonical值，但内容AI出题UI只提供单选、多选、判断、案例分析四类，缺少填空、简答、计算；其多选请求还使用未注册的multiple_choice而不是multi_choice。个人AI出题表面提供四类选择但生产请求固定single_choice，个人AI组卷也只提供三类客观题分布，后续私有学习模型和正式题源resolver仅接受single_choice、multi_choice、true_false、short_answer四类。共享请求合同又把questionType定义成任意string且服务端不做七型allowlist：Provider若返回canonical multi_choice会与内容请求multiple_choice不一致而解析失败，若跟随请求返回multiple_choice则正式采纳转换器不识别该别名并静默回退为short_answer。七型在生成、正式采纳、私有组卷和作答消费者间均无法保持题型、评分、选项与答案语义。"
    originalRootCauseHypothesis: "AI生成模块自建了面向早期样例的字符串枚举和三类客观题分布，没有复用正式QuestionType及按subject/section建模的统一题型合同；各层各自维护不完整alias表并用默认short_answer掩盖未知值。"
    originalBlastRadius: "内容与个人AI出题的题型选择、Provider结构校验、正式采纳、私有训练作答、评分方式和选项语义，以及内容/个人AI组卷的题型分布、技能卷、大题结构和后续学习消费者。"
    originalRuntimeEvidenceNeeded: "false"
    originalNextAction: "修复线程应让AI UI、API、Provider schema、parser、正式采纳、私有学习session和paper plan统一引用canonical QuestionType；服务端拒绝非法值并在唯一兼容层把批准alias归一。组卷分布改为七型可验证配额或大题结构，按theory/skill约束，并保证预览选中题与可作答session逐题守恒。补七型逐型生成/组卷/作答、multiple_choice兼容、多选不降级、非法值、技能卷主观题和分布总数测试。"
